name: Deploy to GitHub Pages
on:
  push:
    branches: [master]
    paths:
      - '3. 웰페리온 가이드/**'
      - '1. AI학습자료_아카이브/08_로고&워터마크/_assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage pages with external assets
        run: |
          mkdir -p _pages_build
          cp -r "3. 웰페리온 가이드/." _pages_build/
          mkdir -p "_pages_build/1. AI학습자료_아카이브/08_로고&워터마크/_assets"
          cp -r "1. AI학습자료_아카이브/08_로고&워터마크/_assets/." \
                "_pages_build/1. AI학습자료_아카이브/08_로고&워터마크/_assets/"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_pages_build'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
