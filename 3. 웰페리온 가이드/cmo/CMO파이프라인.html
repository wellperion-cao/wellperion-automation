<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰페리온 CMO 콘텐츠 파이프라인</title>
<style>
:root{--bg:#221F20;--paper:#2a2725;--text:#f5f2ef;--dim:#8c8b83;--accent:#B79F8A;--accent-bg:rgba(183,159,138,0.12);--border:#3d3835;--green:#6abf7b;--green-bg:rgba(106,191,123,0.12);--red:#ED5B3F;--red-bg:rgba(237,91,63,0.12);--yellow:#e6c84e;--yellow-bg:rgba(230,200,78,0.12);--blue:#5b9fd5;--blue-bg:rgba(91,159,213,0.12);--purple:#a78bda;--purple-bg:rgba(167,139,218,0.12);--orange:#e6944e;--orange-bg:rgba(230,148,78,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:15px;min-height:100vh}
a{color:var(--accent);text-decoration:none}

.sticky-top{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border)}
.header{background:var(--paper);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:17px;font-weight:700}
.header-right{display:flex;gap:6px;flex-wrap:wrap}
.header-right a,.header-right button{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.header-right a:hover,.header-right button:hover{background:var(--accent-bg);color:var(--accent);border-color:rgba(183,159,138,0.3)}

.stage-bar{display:flex;padding:10px 20px;gap:4px;overflow-x:auto;background:var(--bg)}
.stage-btn{padding:8px 16px;border:1px solid transparent;border-radius:8px;background:none;color:var(--dim);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;white-space:nowrap;transition:all 0.15s}
.stage-btn.active{border-color:rgba(183,159,138,0.3)}
.stage-btn:hover{background:var(--accent-bg)}
.stage-count{font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:700}

.content{padding:16px 20px 100px;max-width:800px;margin:0 auto}

/* Pipeline cards */
.pipeline-card{background:var(--paper);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color 0.15s}
.pipeline-card:hover{border-color:rgba(183,159,138,0.2)}
.card-header{display:flex;align-items:center;padding:14px 16px;gap:10px;cursor:pointer}
.card-header:hover{background:var(--accent-bg)}
.card-num{font-size:12px;font-weight:700;color:var(--accent);min-width:24px;text-align:center}
.card-stage{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;white-space:nowrap}
.card-title{flex:1;font-size:14px;font-weight:700;min-width:0;word-break:break-word}
.card-cat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--accent-bg);color:var(--accent);white-space:nowrap}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.card-actions button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit}
.card-actions button:hover{background:var(--accent-bg);color:var(--accent)}
.card-actions button.advance{background:var(--green-bg);color:var(--green);border-color:rgba(106,191,123,0.3)}

.card-body{display:none;padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--bg)}
.card-body.open{display:block}
.channel-row{display:flex;gap:12px;margin-bottom:8px}
.channel-item{display:flex;align-items:center;gap:6px;font-size:12px}
.channel-dot{width:8px;height:8px;border-radius:50%}
.channel-dot.대기{background:var(--dim)}
.channel-dot.진행중{background:var(--orange)}
.channel-dot.완료{background:var(--green)}
.channel-dot.건너뜀{background:var(--border)}
.detail-row{display:flex;gap:8px;font-size:12px;margin-bottom:3px}
.detail-label{color:var(--dim);min-width:70px}

/* Summary cards */
.summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.summary-card{flex:1;min-width:80px;background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.summary-card .num{font-size:22px;font-weight:700}
.summary-card .label{font-size:11px;color:var(--dim);margin-top:2px}

/* Stage progress bar */
.stage-progress{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--border);margin:16px 0 20px}
.stage-progress div{height:100%;transition:width 0.3s}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--paper);border:1px solid var(--border);border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px 20px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent)}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--dim);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid;transition:opacity 0.15s}
.modal-btn:hover{opacity:0.85}
.modal-btn.save{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-btn.cancel{background:var(--paper);color:var(--dim);border-color:var(--border)}

.toast{position:fixed;top:70px;right:20px;background:var(--green-bg);color:var(--green);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;display:none;z-index:300;border:1px solid rgba(106,191,123,0.3)}
.toast.error{background:var(--red-bg);color:var(--red);border-color:rgba(237,91,63,0.3)}

.add-bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;justify-content:center;z-index:100}
.add-btn{padding:12px 24px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff;flex:1;max-width:400px;transition:opacity 0.15s}
.add-btn:hover{opacity:0.85}

.empty-msg{text-align:center;padding:40px 20px;color:var(--dim);font-size:14px}
.loading{text-align:center;padding:40px;color:var(--dim)}

@media print{
  .sticky-top,.add-bar,.card-actions,.modal-overlay,.toast{display:none!important}
  body{background:#fff;color:#222;font-size:11px}
  .content{padding:0;max-width:100%}
  .pipeline-card{border:1px solid #ccc;break-inside:avoid}
  .card-body{display:block!important}
}
@media(max-width:600px){
  .header{flex-direction:column;gap:8px;align-items:flex-start}
  .header-right{width:100%}
  .field-row{flex-direction:column;gap:0}
  .channel-row{flex-direction:column;gap:4px}
  .summary-row{flex-direction:column}
}
</style>
</head>
<body>

<div class="sticky-top">
  <div class="header">
    <h1>CMO 콘텐츠 파이프라인</h1>
    <div class="header-right">
      <button onclick="window.print()">인쇄</button>
      <button onclick="showShareModal()">보고용</button>
      <a href="../wellperion_guide(main).html">가이드허브</a>
    </div>
  </div>
  <div class="stage-bar" id="stageBar"></div>
</div>

<div class="toast" id="toast"></div>

<div class="content" id="mainContent">
  <div class="loading">불러오는 중...</div>
</div>

<div class="add-bar">
  <button class="add-btn" onclick="openAddModal()">+ 콘텐츠 등록</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="cmoModal">
  <div class="modal">
    <h2 id="modalTitle">콘텐츠 등록</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>콘텐츠명 *</label>
      <input type="text" id="fName" placeholder="예: WJO 여름 프로그램">
    </div>
    <div class="field-row">
      <div class="field">
        <label>카테고리 *</label>
        <select id="fCategory">
          <option value="">선택</option>
          <option>WJO</option><option>발레</option><option>바레</option><option>스쿼시</option>
          <option>시설안내</option><option>이벤트</option><option>회원후기</option><option>기타</option>
        </select>
      </div>
      <div class="field">
        <label>현재 단계</label>
        <select id="fStage">
          <option>가공</option><option>검수</option><option>발행</option><option>추적</option><option>완료</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>IG</label><select id="fIG"><option>대기</option><option>진행중</option><option>완료</option><option>건너뜀</option></select></div>
      <div class="field"><label>블로그</label><select id="fBlog"><option>대기</option><option>진행중</option><option>완료</option><option>건너뜀</option></select></div>
      <div class="field"><label>카페</label><select id="fCafe"><option>대기</option><option>진행중</option><option>완료</option><option>건너뜀</option></select></div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>검수 상태</label>
        <select id="fReview"><option>대기</option><option>요청</option><option>승인</option><option>반려</option></select>
      </div>
      <div class="field">
        <label>담당자</label>
        <input type="text" id="fOwner" placeholder="CMO">
      </div>
    </div>
    <div class="field">
      <label>콘텐츠 폴더 경로</label>
      <input type="text" id="fFolder" placeholder="instagram/2026/05/5.26-콘텐츠명">
    </div>
    <div class="field">
      <label>비고</label>
      <textarea id="fNote" placeholder="메모"></textarea>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn save" id="modalSaveBtn" onclick="saveContent()">등록</button>
    </div>
  </div>
</div>

<!-- Share Modal -->
<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h2>파이프라인 보고</h2>
    <pre id="shareContent" style="background:var(--bg);padding:12px;border-radius:8px;font-size:12px;white-space:pre-wrap;color:var(--text);max-height:50vh;overflow-y:auto;"></pre>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="document.getElementById('shareModal').classList.remove('show')">닫기</button>
      <button class="modal-btn save" onclick="navigator.clipboard.writeText(document.getElementById('shareContent').textContent).then(()=>showToast('복사됨'))">복사</button>
    </div>
  </div>
</div>

<script>
const API_URL = '{{APPS_SCRIPT_URL}}';
const STAGES = ['가공','검수','발행','추적','완료'];
const STAGE_COLORS = {'가공':'var(--orange)','검수':'var(--purple)','발행':'var(--blue)','추적':'var(--green)','완료':'var(--dim)'};
const STAGE_BGS = {'가공':'var(--orange-bg)','검수':'var(--purple-bg)','발행':'var(--blue-bg)','추적':'var(--green-bg)','완료':'rgba(140,139,131,0.12)'};

let ALL_ITEMS = [];
let activeStage = '전체';

document.addEventListener('DOMContentLoaded', () => { buildStageBar(); loadItems(); });

function apiCall(params) {
  return new Promise((resolve, reject) => {
    const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    fetch(API_URL + '?' + qs)
      .then(r => r.json())
      .then(d => d.ok ? resolve(d) : reject(d.error || 'API 오류'))
      .catch(err => {
        if (!navigator.onLine) resolve({ok:true, data: JSON.parse(localStorage.getItem('cmo_items')||'[]')});
        else reject(err.message);
      });
  });
}

async function loadItems() {
  try {
    const res = await apiCall({action:'cmo_list'});
    ALL_ITEMS = res.data || [];
    localStorage.setItem('cmo_items', JSON.stringify(ALL_ITEMS));
  } catch(e) {
    ALL_ITEMS = JSON.parse(localStorage.getItem('cmo_items')||'[]');
  }
  renderAll();
}

function buildStageBar() {
  const bar = document.getElementById('stageBar');
  let html = '<button class="stage-btn active" onclick="filterStage(\'전체\',this)">전체</button>';
  STAGES.forEach(s => {
    html += '<button class="stage-btn" onclick="filterStage(\''+s+'\',this)" style="--sc:'+STAGE_COLORS[s]+'">'+s+'<span class="stage-count" id="cnt_'+s+'" style="background:'+STAGE_BGS[s]+';color:'+STAGE_COLORS[s]+'">0</span></button>';
  });
  bar.innerHTML = html;
}

function filterStage(stage, btn) {
  activeStage = stage;
  document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAll();
}

function renderAll() {
  const el = document.getElementById('mainContent');
  let filtered = ALL_ITEMS;
  if (activeStage !== '전체') filtered = filtered.filter(i => i['현재단계'] === activeStage);

  // Update counts
  STAGES.forEach(s => {
    const cnt = ALL_ITEMS.filter(i => i['현재단계'] === s).length;
    const el = document.getElementById('cnt_'+s);
    if (el) el.textContent = cnt;
  });

  let html = '';

  // Summary
  const total = ALL_ITEMS.length;
  const stageCounts = {};
  STAGES.forEach(s => { stageCounts[s] = ALL_ITEMS.filter(i => i['현재단계'] === s).length; });

  html += '<div class="summary-row">';
  html += '<div class="summary-card"><div class="num" style="color:var(--accent)">'+total+'</div><div class="label">전체</div></div>';
  STAGES.forEach(s => {
    html += '<div class="summary-card"><div class="num" style="color:'+STAGE_COLORS[s]+'">'+stageCounts[s]+'</div><div class="label">'+s+'</div></div>';
  });
  html += '</div>';

  // Progress bar
  if (total > 0) {
    html += '<div class="stage-progress">';
    STAGES.forEach(s => {
      const pct = (stageCounts[s]/total*100).toFixed(1);
      html += '<div style="width:'+pct+'%;background:'+STAGE_COLORS[s]+'" title="'+s+' '+stageCounts[s]+'건 ('+pct+'%)"></div>';
    });
    html += '</div>';
  }

  // Cards
  if (filtered.length === 0) {
    html += '<div class="empty-msg">'+(activeStage==='전체'?'등록된 콘텐츠가 없습니다.':activeStage+' 단계 콘텐츠가 없습니다.')+'</div>';
  } else {
    filtered.sort((a,b) => (b['수정일']||'').localeCompare(a['수정일']||''));
    filtered.forEach((item, idx) => { html += renderCard(item, idx+1); });
  }

  el.innerHTML = html;
}

function renderCard(item, idx) {
  const stage = item['현재단계'] || '가공';
  const stageColor = STAGE_COLORS[stage] || 'var(--dim)';
  const stageBg = STAGE_BGS[stage] || 'var(--accent-bg)';
  const canAdvance = STAGES.indexOf(stage) < STAGES.length - 1;

  let html = '<div class="pipeline-card" style="border-left:3px solid '+stageColor+'">';
  html += '<div class="card-header" onclick="toggleBody(this)">';
  html += '<span class="card-num">'+idx+'</span>';
  html += '<span class="card-stage" style="background:'+stageBg+';color:'+stageColor+'">'+esc(stage)+'</span>';
  html += '<span class="card-title">'+esc(item['콘텐츠명'])+'</span>';
  if (item['카테고리']) html += '<span class="card-cat">'+esc(item['카테고리'])+'</span>';
  html += '<div class="card-actions">';
  html += '<button onclick="event.stopPropagation();openEditModal(\''+escA(item.id)+'\')">편집</button>';
  if (canAdvance) html += '<button class="advance" onclick="event.stopPropagation();advanceStage(\''+escA(item.id)+'\')">다음 단계</button>';
  html += '</div></div>';

  // Body
  html += '<div class="card-body">';
  html += '<div class="channel-row">';
  ['IG','블로그','카페'].forEach(ch => {
    const st = item[ch] || '대기';
    html += '<div class="channel-item"><span class="channel-dot '+st+'"></span><strong>'+ch+'</strong> '+st+'</div>';
  });
  html += '</div>';
  if (item['검수상태'] && item['검수상태'] !== '대기') html += '<div class="detail-row"><span class="detail-label">검수</span><span>'+esc(item['검수상태'])+'</span></div>';
  if (item['담당자']) html += '<div class="detail-row"><span class="detail-label">담당자</span><span>'+esc(item['담당자'])+'</span></div>';
  if (item['콘텐츠폴더']) html += '<div class="detail-row"><span class="detail-label">폴더</span><span style="font-size:11px;word-break:break-all;">'+esc(item['콘텐츠폴더'])+'</span></div>';
  if (item['비고']) html += '<div class="detail-row"><span class="detail-label">비고</span><span>'+esc(item['비고'])+'</span></div>';
  if (item['수정일']) html += '<div class="detail-row"><span class="detail-label">수정일</span><span style="color:var(--dim)">'+esc(String(item['수정일']).slice(0,16))+'</span></div>';
  html += '</div></div>';
  return html;
}

function toggleBody(header) { header.nextElementSibling.classList.toggle('open'); }

// Modal
function openAddModal() {
  document.getElementById('modalTitle').textContent = '콘텐츠 등록';
  document.getElementById('editId').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fStage').value = '가공';
  document.getElementById('fIG').value = '대기';
  document.getElementById('fBlog').value = '대기';
  document.getElementById('fCafe').value = '대기';
  document.getElementById('fReview').value = '대기';
  document.getElementById('fOwner').value = '';
  document.getElementById('fFolder').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('modalSaveBtn').textContent = '등록';
  document.getElementById('cmoModal').classList.add('show');
}

function openEditModal(id) {
  const item = ALL_ITEMS.find(x => x.id === id);
  if (!item) return;
  document.getElementById('modalTitle').textContent = '콘텐츠 편집';
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = item['콘텐츠명'] || '';
  document.getElementById('fCategory').value = item['카테고리'] || '';
  document.getElementById('fStage').value = item['현재단계'] || '가공';
  document.getElementById('fIG').value = item['IG'] || '대기';
  document.getElementById('fBlog').value = item['블로그'] || '대기';
  document.getElementById('fCafe').value = item['카페'] || '대기';
  document.getElementById('fReview').value = item['검수상태'] || '대기';
  document.getElementById('fOwner').value = item['담당자'] || '';
  document.getElementById('fFolder').value = item['콘텐츠폴더'] || '';
  document.getElementById('fNote').value = item['비고'] || '';
  document.getElementById('modalSaveBtn').textContent = '수정';
  document.getElementById('cmoModal').classList.add('show');
}

function closeModal() { document.getElementById('cmoModal').classList.remove('show'); }

async function saveContent() {
  const name = document.getElementById('fName').value.trim();
  const cat = document.getElementById('fCategory').value;
  if (!name) { alert('콘텐츠명을 입력하세요.'); return; }
  if (!cat) { alert('카테고리를 선택하세요.'); return; }

  const editId = document.getElementById('editId').value;
  const params = {
    action: editId ? 'cmo_update' : 'cmo_add',
    '콘텐츠명': name,
    '카테고리': cat,
    '현재단계': document.getElementById('fStage').value,
    'IG': document.getElementById('fIG').value,
    '블로그': document.getElementById('fBlog').value,
    '카페': document.getElementById('fCafe').value,
    '검수상태': document.getElementById('fReview').value,
    '담당자': document.getElementById('fOwner').value,
    '콘텐츠폴더': document.getElementById('fFolder').value,
    '비고': document.getElementById('fNote').value,
    '생성자': '김남욱GM'
  };
  if (editId) params.id = editId;

  closeModal();
  showToast('저장 중...');
  try {
    const res = await apiCall(params);
    if (res.ok) { showToast(editId ? '수정 완료' : '등록 완료'); await loadItems(); }
    else throw new Error(res.error);
  } catch(e) {
    showToast('저장 실패: '+e, true);
  }
}

async function advanceStage(id) {
  const item = ALL_ITEMS.find(x => x.id === id);
  if (!item) return;
  const cur = item['현재단계'];
  const idx = STAGES.indexOf(cur);
  const next = STAGES[idx+1];
  if (!confirm(item['콘텐츠명']+'\n'+cur+' → '+next+' 단계로 이동하시겠습니까?')) return;
  showToast('단계 이동 중...');
  try {
    const res = await apiCall({action:'cmo_advance', id:id});
    if (res.ok) { showToast(cur+' → '+next+' 이동 완료'); await loadItems(); }
    else throw new Error(res.error);
  } catch(e) {
    showToast('이동 실패: '+e, true);
  }
}

function showShareModal() {
  const lines = ['━━━ CMO 콘텐츠 파이프라인 현황 ━━━'];
  const now = new Date();
  lines.push('보고일: '+now.toISOString().slice(0,10));
  lines.push('');
  STAGES.forEach(s => {
    const items = ALL_ITEMS.filter(i => i['현재단계'] === s);
    lines.push('['+s+'] '+items.length+'건');
    items.forEach(i => { lines.push('  - '+i['콘텐츠명']+' ('+i['카테고리']+')'); });
  });
  lines.push('');
  lines.push('━━━ 총 '+ALL_ITEMS.length+'건 ━━━');
  document.getElementById('shareContent').textContent = lines.join('\n');
  document.getElementById('shareModal').classList.add('show');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
function escA(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : ''; }
</script>
