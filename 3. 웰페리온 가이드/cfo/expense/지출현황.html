<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰페리온 지출현황</title>
<style>
:root {
  --bg:#221F20;--paper:#2a2725;--text:#f5f2ef;--dim:#8c8b83;
  --accent:#B79F8A;--accent-bg:rgba(183,159,138,0.12);--border:#3d3835;
  --green:#6abf7b;--green-bg:rgba(106,191,123,0.12);
  --red:#ED5B3F;--red-bg:rgba(237,91,63,0.12);
  --yellow:#e6c84e;--yellow-bg:rgba(230,200,78,0.12);
  --blue:#5b9fd5;--blue-bg:rgba(91,159,213,0.12);
  --purple:#a78bda;--purple-bg:rgba(167,139,218,0.12);
  --orange:#e6944e;--orange-bg:rgba(230,148,78,0.12);
  --primary: var(--accent);
  --success: var(--green);
  --warning: var(--orange);
  --danger: var(--red);
  --muted: var(--dim);
  --card-bg: var(--paper);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif; background: var(--bg); color: var(--text); line-height:1.6; font-size:15px; }
a { color: var(--accent); text-decoration: none; }

/* ── 상단 고정 ── */
.sticky-top {
  position: sticky; top: 0; z-index: 100; background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.header {
  background: var(--paper); display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 17px; font-weight: 700; }
.header-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.header-btns button, .header-btns a {
  padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px; font-family: inherit; text-decoration: none;
}
.header-btns button:hover, .header-btns a:hover { background: var(--accent-bg); color: var(--accent); border-color: rgba(183,159,138,0.3); }

/* ── 탭 바 ── */
.tab-bar {
  display: flex; border-bottom: 2px solid var(--border); padding: 0 16px; background: var(--bg);
}
.tab-bar button {
  padding: 10px 16px; border: none; background: none;
  cursor: pointer; font-size: 14px; color: var(--dim); font-family: inherit;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
}
.tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ── 필터 바 ── */
.filter-bar {
  display: flex; gap: 8px; padding: 10px 16px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); align-items: center; background: var(--bg);
}
.filter-bar select, .filter-bar input {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit;
}
.filter-bar .total-badge {
  margin-left: auto; font-size: 14px; font-weight: 600; color: var(--accent);
}

/* ── 콘텐츠 영역 ── */
.content { padding: 12px 16px; max-width: 960px; margin: 0 auto; }

/* ── 카드 ── */
.expense-card {
  background: var(--paper); border-radius: 12px; margin-bottom: 8px;
  border: 1px solid var(--border); overflow: hidden;
}
.expense-card-header {
  display: flex; align-items: center; padding: 12px 14px;
  cursor: pointer; gap: 10px;
}
.expense-card-header:hover { background: var(--accent-bg); }
.expense-date { font-size: 12px; color: var(--dim); min-width: 80px; }
.expense-cat {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--accent-bg); color: var(--accent); white-space: nowrap; font-weight: 600;
}
.expense-name { flex: 1; font-size: 14px; font-weight: 500; }
.expense-amount { font-size: 15px; font-weight: 700; color: var(--danger); min-width: 90px; text-align: right; }
.expense-approval {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; color: #fff; white-space: nowrap;
}
.approval-대기 { background: var(--warning); }
.approval-승인 { background: var(--success); }
.approval-반려 { background: var(--danger); }
@media(max-width:600px){.expense-date,.expense-amount{min-width:auto;}}
.approval-보류 { background: var(--muted); }
.expense-actions { display: flex; gap: 4px; }
.expense-actions button {
  padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 600;
}
.expense-actions button:hover { background: var(--accent-bg); color: var(--accent); }
.expense-card-body {
  display: none; padding: 10px 14px 14px; border-top: 1px solid var(--border);
  font-size: 13px; background: var(--bg);
}
.expense-card-body .detail-row { display: flex; gap: 8px; margin-bottom: 4px; }
.expense-card-body .detail-label { color: var(--dim); min-width: 80px; }
.expense-card.open .expense-card-body { display: block; }

/* ── 등록 폼 ── */
.add-form {
  background: var(--paper); border-radius: 12px; padding: 16px;
  border: 1px solid var(--border); margin-bottom: 16px;
}
.add-form h3 { font-size: 15px; margin-bottom: 12px; color: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; color: var(--muted); }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
  background: var(--bg); color: var(--text); font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 50px; }
.form-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
.btn-primary {
  padding: 8px 20px; border: none; border-radius: 8px;
  background: var(--accent); color: #fff; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit;
}
.btn-primary:hover { opacity: 0.85; }
.btn-cancel {
  padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--paper); color: var(--dim); cursor: pointer; font-size: 13px; font-family: inherit;
}

/* ── 대시보드 ── */
.dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.dash-card {
  background: var(--paper); border-radius: 12px; padding: 16px;
  border: 1px solid var(--border);
}
.dash-card h4 { font-size: 13px; color: var(--dim); margin-bottom: 8px; }
.dash-total { font-size: 28px; font-weight: 700; color: var(--accent); }
.dash-sub { font-size: 12px; color: var(--dim); margin-top: 4px; }
.dash-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.dash-bar-label { font-size: 12px; min-width: 80px; }
.dash-bar-fill {
  height: 16px; border-radius: 3px; background: var(--accent);
  transition: width 0.3s; min-width: 2px;
}
.dash-bar-val { font-size: 12px; color: var(--dim); white-space: nowrap; }

/* ── 인쇄 ── */
@media print {
  .sticky-top, .add-form, .expense-actions, .header-btns, .filter-bar { display: none !important; }
  .expense-card-body { display: block !important; }
  .content { max-width: 100%; }
  body { background: #fff; }
}

/* ── 로딩 ── */
.loading { text-align: center; padding: 40px; color: var(--dim); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--dim); }

/* ── 공유 모달 ── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--paper); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
  max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 12px; }
.modal pre { background: var(--bg); padding: 12px; border-radius: 8px; font-size: 12px; white-space: pre-wrap; overflow-x: auto; color: var(--text); }
.modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }

@media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr; }
  .dashboard { grid-template-columns: 1fr; }
  .expense-card-header { flex-wrap: wrap; }
  .filter-bar { flex-direction: column; }
}
</style>
</head>
<body>

<!-- ▸ 상단 고정 -->
<div class="sticky-top">
  <div class="header">
    <h1>웰페리온 지출현황</h1>
    <div class="header-btns">
      <a href="/"><span>&#127968;</span> 가이드허브</a>
      <button onclick="window.print()"><span>&#128424;</span> 인쇄</button>
      <button onclick="showShareModal('report')"><span>&#128203;</span> 보고용</button>
      <button onclick="showShareModal('share')"><span>&#128279;</span> 공유용</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="active" onclick="switchTab('list')">지출 목록</button>
    <button onclick="switchTab('dashboard')">현황 대시보드</button>
    <button onclick="switchTab('add')">지출 등록</button>
  </div>
  <div class="filter-bar" id="filterBar">
    <select id="filterMonth" onchange="applyFilter()">
      <option value="">전체 월</option>
    </select>
    <select id="filterCategory" onchange="applyFilter()">
      <option value="">전체 카테고리</option>
    </select>
    <select id="filterApproval" onchange="applyFilter()">
      <option value="">전체 상태</option>
      <option value="대기">대기</option>
      <option value="승인">승인</option>
      <option value="반려">반려</option>
      <option value="보류">보류</option>
    </select>
    <span class="total-badge" id="totalBadge">합계: -</span>
  </div>
</div>

<!-- ▸ 콘텐츠 -->
<div class="content">
  <!-- 지출 목록 탭 -->
  <div id="tabList">
    <div class="loading" id="loadingMsg">불러오는 중...</div>
    <div id="expenseList"></div>
    <div class="empty-state" id="emptyState" style="display:none;">등록된 지출이 없습니다.</div>
  </div>

  <!-- 대시보드 탭 -->
  <div id="tabDashboard" style="display:none;">
    <div class="dashboard" id="dashboardGrid"></div>
  </div>

  <!-- 등록 탭 -->
  <div id="tabAdd" style="display:none;">
    <div class="add-form">
      <h3 id="formTitle">새 지출 등록</h3>
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="form-group">
          <label>날짜</label>
          <input type="date" id="fDate">
        </div>
        <div class="form-group">
          <label>카테고리</label>
          <select id="fCategory">
            <option value="">선택</option>
            <option>시설유지보수</option>
            <option>인건비</option>
            <option>마케팅</option>
            <option>사무용품</option>
            <option>식음료</option>
            <option>외주용역</option>
            <option>보험/세금</option>
            <option>기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>항목명</label>
          <input type="text" id="fName" placeholder="지출 항목명">
        </div>
        <div class="form-group">
          <label>금액 (원)</label>
          <input type="number" id="fAmount" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>결제수단</label>
          <select id="fPayment">
            <option value="">선택</option>
            <option>법인카드</option>
            <option>계좌이체</option>
            <option>현금</option>
            <option>개인카드(후정산)</option>
            <option>기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>승인상태</label>
          <select id="fApproval">
            <option>대기</option>
            <option>승인</option>
            <option>반려</option>
            <option>보류</option>
          </select>
        </div>
        <div class="form-group full">
          <label>비고</label>
          <textarea id="fNote" placeholder="비고 사항"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="resetForm()">초기화</button>
        <button class="btn-primary" onclick="submitExpense()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- ▸ 공유 모달 -->
<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <h3 id="shareModalTitle">보고용 지출 요약</h3>
    <pre id="shareModalContent"></pre>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeShareModal()">닫기</button>
      <button class="btn-primary" onclick="copyShareContent()">복사</button>
    </div>
  </div>
</div>

<script>
// ─── 설정 ───
// Apps Script 웹앱 URL (배포 후 교체)
const API_URL = 'https://script.google.com/macros/s/AKfycbzKIAxYYLwcvz7ACJJFGWjA11xtUH-oKDNAMtBxQL0MM0tdbe481ef-4VKOa5sIL63SfA/exec';

let allExpenses = [];
let currentTab = 'list';

// ─── 초기화 ───
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fDate').value = new Date().toISOString().slice(0, 10);
  loadExpenses();
});

// ─── API 호출 ───
function apiCall(action, params = {}) {
  return new Promise((resolve, reject) => {
    params.action = action;
    const qs = Object.entries(params)
      .map(([k, v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v))
      .join('&');
    const url = API_URL + '?' + qs;

    fetch(url)
      .then(r => r.json())
      .then(data => {
        if (data.ok) resolve(data);
        else reject(data.error || 'API 오류');
      })
      .catch(err => {
        // 오프라인 fallback
        if (!navigator.onLine) {
          resolve(loadFromLocal(action));
        } else {
          reject(err.message);
        }
      });
  });
}

// ─── localStorage fallback ───
function saveToLocal(data) {
  localStorage.setItem('wellperion_expenses', JSON.stringify(data));
}

function loadFromLocal(action) {
  const raw = localStorage.getItem('wellperion_expenses');
  if (!raw) return { ok: true, count: 0, data: [] };
  const data = JSON.parse(raw);
  return { ok: true, count: data.length, data: data };
}

// ─── 데이터 로드 ───
async function loadExpenses() {
  const loadingMsg = document.getElementById('loadingMsg');
  const emptyState = document.getElementById('emptyState');
  const listEl = document.getElementById('expenseList');

  try {
    const result = await apiCall('expense_list');
    allExpenses = result.data || [];
    saveToLocal(allExpenses);
  } catch (e) {
    console.warn('API 실패, 로컬 데이터 사용:', e);
    const local = loadFromLocal();
    allExpenses = local.data || [];
  }

  loadingMsg.style.display = 'none';
  populateMonthFilter();
  applyFilter();
}

// ─── 월 필터 자동 생성 ───
function populateMonthFilter() {
  const months = new Set();
  allExpenses.forEach(e => {
    const d = String(e['날짜'] || '');
    if (d.length >= 7) months.add(d.substring(0, 7));
  });
  const sel = document.getElementById('filterMonth');
  const sorted = Array.from(months).sort().reverse();
  sorted.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
}

// ─── 필터 적용 ───
function applyFilter() {
  const month = document.getElementById('filterMonth').value;
  const cat = document.getElementById('filterCategory').value;
  const approval = document.getElementById('filterApproval').value;

  let filtered = allExpenses;
  if (month) filtered = filtered.filter(e => String(e['날짜']).startsWith(month));
  if (cat) filtered = filtered.filter(e => e['카테고리'] === cat);
  if (approval) filtered = filtered.filter(e => e['승인상태'] === approval);

  renderList(filtered);
  updateTotalBadge(filtered);
  if (currentTab === 'dashboard') renderDashboard(filtered);
}

// ─── 목록 렌더링 ───
function renderList(items) {
  const listEl = document.getElementById('expenseList');
  const emptyState = document.getElementById('emptyState');

  if (items.length === 0) {
    listEl.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  // 날짜 내림차순 정렬
  items.sort((a, b) => String(b['날짜']).localeCompare(String(a['날짜'])));

  listEl.innerHTML = items.map(e => {
    const amount = Number(e['금액']) || 0;
    const approval = e['승인상태'] || '대기';
    return `
    <div class="expense-card" data-id="${e.id}">
      <div class="expense-card-header" onclick="toggleCard(this)">
        <span class="expense-date">${e['날짜'] || '-'}</span>
        <span class="expense-cat">${e['카테고리'] || '-'}</span>
        <span class="expense-name">${e['항목명'] || '-'}</span>
        <span class="expense-amount">${amount.toLocaleString()}원</span>
        <span class="expense-approval approval-${approval}">${approval}</span>
        <div class="expense-actions">
          <button onclick="event.stopPropagation(); editExpense('${e.id}')">수정</button>
          <button onclick="event.stopPropagation(); deleteExpense('${e.id}')">삭제</button>
        </div>
      </div>
      <div class="expense-card-body">
        <div class="detail-row"><span class="detail-label">결제수단</span><span>${e['결제수단'] || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">비고</span><span>${e['비고'] || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">등록자</span><span>${e['등록자'] || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">등록일</span><span>${e['등록일'] || '-'}</span></div>
        <div class="detail-row"><span class="detail-label">ID</span><span>${e.id}</span></div>
      </div>
    </div>`;
  }).join('');
}

// ─── 합계 뱃지 ───
function updateTotalBadge(items) {
  const total = items.reduce((s, e) => s + (Number(e['금액']) || 0), 0);
  document.getElementById('totalBadge').textContent = `합계: ${total.toLocaleString()}원 (${items.length}건)`;
}

// ─── 카드 토글 ───
function toggleCard(header) {
  header.closest('.expense-card').classList.toggle('open');
}

// ─── 탭 전환 ───
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b => {
    if (
      (tab === 'list' && b.textContent.includes('목록')) ||
      (tab === 'dashboard' && b.textContent.includes('대시보드')) ||
      (tab === 'add' && b.textContent.includes('등록'))
    ) b.classList.add('active');
  });
  document.getElementById('tabList').style.display = tab === 'list' ? '' : 'none';
  document.getElementById('tabDashboard').style.display = tab === 'dashboard' ? '' : 'none';
  document.getElementById('tabAdd').style.display = tab === 'add' ? '' : 'none';
  document.getElementById('filterBar').style.display = tab === 'add' ? 'none' : '';

  if (tab === 'dashboard') {
    applyFilter();
  }
}

// ─── 대시보드 렌더링 ───
function renderDashboard(items) {
  const grid = document.getElementById('dashboardGrid');
  const total = items.reduce((s, e) => s + (Number(e['금액']) || 0), 0);

  // 카테고리별
  const byCat = {};
  items.forEach(e => {
    const cat = e['카테고리'] || '기타';
    byCat[cat] = (byCat[cat] || 0) + (Number(e['금액']) || 0);
  });
  const catMax = Math.max(...Object.values(byCat), 1);

  // 결제수단별
  const byPay = {};
  items.forEach(e => {
    const pm = e['결제수단'] || '기타';
    byPay[pm] = (byPay[pm] || 0) + (Number(e['금액']) || 0);
  });
  const payMax = Math.max(...Object.values(byPay), 1);

  // 월별
  const byMonth = {};
  items.forEach(e => {
    const d = String(e['날짜'] || '');
    const m = d.length >= 7 ? d.substring(0, 7) : '미정';
    byMonth[m] = (byMonth[m] || 0) + (Number(e['금액']) || 0);
  });
  const monthMax = Math.max(...Object.values(byMonth), 1);

  // 승인상태별
  const byApproval = {};
  items.forEach(e => {
    const st = e['승인상태'] || '대기';
    byApproval[st] = (byApproval[st] || 0) + 1;
  });

  grid.innerHTML = `
    <div class="dash-card">
      <h4>총 지출액</h4>
      <div class="dash-total">${total.toLocaleString()}원</div>
      <div class="dash-sub">${items.length}건</div>
    </div>
    <div class="dash-card">
      <h4>승인 현황</h4>
      ${Object.entries(byApproval).map(([st, cnt]) =>
        `<div class="dash-bar">
          <span class="dash-bar-label">${st}</span>
          <span class="expense-approval approval-${st}" style="min-width:30px;text-align:center">${cnt}</span>
        </div>`
      ).join('')}
    </div>
    <div class="dash-card" style="grid-column:1/-1">
      <h4>카테고리별 지출</h4>
      ${Object.entries(byCat).sort((a,b) => b[1] - a[1]).map(([cat, amt]) =>
        `<div class="dash-bar">
          <span class="dash-bar-label">${cat}</span>
          <div style="flex:1;background:#e8f0fe;border-radius:3px;overflow:hidden">
            <div class="dash-bar-fill" style="width:${(amt/catMax*100).toFixed(1)}%"></div>
          </div>
          <span class="dash-bar-val">${amt.toLocaleString()}원</span>
        </div>`
      ).join('')}
    </div>
    <div class="dash-card">
      <h4>결제수단별</h4>
      ${Object.entries(byPay).sort((a,b) => b[1] - a[1]).map(([pm, amt]) =>
        `<div class="dash-bar">
          <span class="dash-bar-label">${pm}</span>
          <div style="flex:1;background:#e8f0fe;border-radius:3px;overflow:hidden">
            <div class="dash-bar-fill" style="width:${(amt/payMax*100).toFixed(1)}%"></div>
          </div>
          <span class="dash-bar-val">${amt.toLocaleString()}원</span>
        </div>`
      ).join('')}
    </div>
    <div class="dash-card">
      <h4>월별 추이</h4>
      ${Object.entries(byMonth).sort().map(([m, amt]) =>
        `<div class="dash-bar">
          <span class="dash-bar-label">${m}</span>
          <div style="flex:1;background:#e8f0fe;border-radius:3px;overflow:hidden">
            <div class="dash-bar-fill" style="width:${(amt/monthMax*100).toFixed(1)}%"></div>
          </div>
          <span class="dash-bar-val">${amt.toLocaleString()}원</span>
        </div>`
      ).join('')}
    </div>
  `;
}

// ─── 등록/수정 ───
async function submitExpense() {
  const editId = document.getElementById('editId').value;
  const params = {
    '날짜': document.getElementById('fDate').value,
    '카테고리': document.getElementById('fCategory').value,
    '항목명': document.getElementById('fName').value,
    '금액': document.getElementById('fAmount').value,
    '결제수단': document.getElementById('fPayment').value,
    '비고': document.getElementById('fNote').value,
    '승인상태': document.getElementById('fApproval').value,
    '등록자': '김남욱GM'
  };

  if (!params['항목명'] || !params['금액']) {
    alert('항목명과 금액은 필수입니다.');
    return;
  }

  try {
    if (editId) {
      params.id = editId;
      await apiCall('expense_update', params);
    } else {
      await apiCall('expense_add', params);
    }
    resetForm();
    switchTab('list');
    loadExpenses();
  } catch (e) {
    alert('저장 실패: ' + e);
  }
}

function editExpense(id) {
  const item = allExpenses.find(e => e.id === id);
  if (!item) return;

  document.getElementById('editId').value = id;
  document.getElementById('formTitle').textContent = '지출 수정';
  document.getElementById('fDate').value = String(item['날짜'] || '').substring(0, 10);
  document.getElementById('fCategory').value = item['카테고리'] || '';
  document.getElementById('fName').value = item['항목명'] || '';
  document.getElementById('fAmount').value = item['금액'] || '';
  document.getElementById('fPayment').value = item['결제수단'] || '';
  document.getElementById('fNote').value = item['비고'] || '';
  document.getElementById('fApproval').value = item['승인상태'] || '대기';
  switchTab('add');
}

async function deleteExpense(id) {
  if (!confirm('이 지출 내역을 삭제하시겠습니까?')) return;
  try {
    await apiCall('expense_delete', { id: id });
    loadExpenses();
  } catch (e) {
    alert('삭제 실패: ' + e);
  }
}

function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').textContent = '새 지출 등록';
  document.getElementById('fDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('fCategory').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fAmount').value = '';
  document.getElementById('fPayment').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fApproval').value = '대기';
}

// ─── 공유 모달 ───
function showShareModal(type) {
  const month = document.getElementById('filterMonth').value;
  const filtered = getFilteredItems();
  const total = filtered.reduce((s, e) => s + (Number(e['금액']) || 0), 0);
  const label = month || '전체';

  let content = '';
  if (type === 'report') {
    content = `웰페리온 지출 보고서 (${label})\n`;
    content += `${'='.repeat(40)}\n`;
    content += `총 지출: ${total.toLocaleString()}원 (${filtered.length}건)\n\n`;

    const byCat = {};
    filtered.forEach(e => {
      const cat = e['카테고리'] || '기타';
      byCat[cat] = (byCat[cat] || 0) + (Number(e['금액']) || 0);
    });
    content += `[카테고리별 지출]\n`;
    Object.entries(byCat).sort((a,b) => b[1] - a[1]).forEach(([cat, amt]) => {
      content += `  ${cat}: ${amt.toLocaleString()}원\n`;
    });

    content += `\n[상세 내역]\n`;
    filtered.forEach(e => {
      content += `  ${e['날짜']} | ${e['카테고리']} | ${e['항목명']} | ${Number(e['금액']).toLocaleString()}원 | ${e['승인상태']}\n`;
    });
  } else {
    content = `웰페리온 지출현황 (${label})\n`;
    content += `합계: ${total.toLocaleString()}원 / ${filtered.length}건\n\n`;
    filtered.forEach(e => {
      content += `${e['날짜']} ${e['항목명']} ${Number(e['금액']).toLocaleString()}원\n`;
    });
  }

  document.getElementById('shareModalTitle').textContent = type === 'report' ? '보고용 지출 요약' : '공유용 지출 현황';
  document.getElementById('shareModalContent').textContent = content;
  document.getElementById('shareModal').classList.add('show');
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('show');
}

function copyShareContent() {
  const text = document.getElementById('shareModalContent').textContent;
  navigator.clipboard.writeText(text).then(() => alert('복사되었습니다.'));
}

function getFilteredItems() {
  const month = document.getElementById('filterMonth').value;
  const cat = document.getElementById('filterCategory').value;
  const approval = document.getElementById('filterApproval').value;
  let f = allExpenses;
  if (month) f = f.filter(e => String(e['날짜']).startsWith(month));
  if (cat) f = f.filter(e => e['카테고리'] === cat);
  if (approval) f = f.filter(e => e['승인상태'] === approval);
  return f;
}
