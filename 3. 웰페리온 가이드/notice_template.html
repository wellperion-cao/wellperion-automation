<style>

  @page{size:A4 portrait;margin:0;}
  html,body{width:100%;height:100%;font-family:"Pretendard","Apple SD Gothic Neo",sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  .page{width:210mm;height:297mm;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;background:#fff;}

  .hdr{flex:0 0 38%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#fff;padding:24mm 20mm 12mm;position:relative;}
  .brand-sub{font-size:18pt;font-weight:300;letter-spacing:0.08em;margin-bottom:16mm;opacity:0.92;}
  .title-kr{font-size:32pt;font-weight:700;line-height:1.25;margin-bottom:3mm;}
  .title-en{font-size:16pt;font-weight:600;opacity:0.85;letter-spacing:0.03em;margin-bottom:8mm;}
  .subtitle{font-size:8pt;opacity:0.5;letter-spacing:0.04em;}

  .body{flex:1;background:#fff;color:#1a1a1a;padding:16mm 24mm;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:14pt;line-height:1.9;font-weight:500;}
  .body .hl{color:#ED5B3F;font-weight:700;}

  .ftr{flex:0 0 10%;background:#221F20;display:flex;align-items:center;justify-content:center;gap:4mm;}
  .ftr img{height:8mm;}
  .ftr span{color:#B79F8A;font-size:10pt;font-weight:600;letter-spacing:0.18em;}

  .controls{position:fixed;top:16px;right:16px;display:flex;gap:8px;z-index:100;}
  .controls select,.controls button{padding:8px 16px;font-size:13px;font-weight:600;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;}
  .controls button{background:#221F20;color:#B79F8A;border-color:#221F20;}
  .controls button:hover{opacity:0.85;}
  @media print{.controls{display:none!important;} .page{margin:0;}}
</style>
