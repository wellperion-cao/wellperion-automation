<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;font-family:"Pretendard","Apple SD Gothic Neo",sans-serif;background:#f5f4f2;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .ctrl{position:fixed;top:0;left:0;right:0;background:#fff;border-bottom:1px solid #ddd;padding:12px 24px;display:flex;align-items:center;gap:12px;z-index:100;flex-wrap:wrap;}
  .ctrl select,.ctrl button{padding:8px 16px;font-size:13px;font-weight:600;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;}
  .ctrl button.primary{background:#221F20;color:#B79F8A;border-color:#221F20;}
  .ctrl button.primary:hover{opacity:0.85;}
  .ctrl .sep{width:1px;height:24px;background:#ddd;}
  .ctrl .label{font-size:12px;color:#888;font-weight:600;}
  .page-wrap{display:flex;justify-content:center;padding:80px 20px 40px;}
  .page{background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.12);display:flex;flex-direction:column;overflow:hidden;}
  .page.a4{width:210mm;height:297mm;}
  .page.a3{width:297mm;height:420mm;}
  .hdr{flex:0 0 28%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#fff;padding:4% 8% 2%;position:relative;}
  .hdr-label{font-size:0.9em;letter-spacing:0.25em;opacity:0.5;margin-bottom:1%;text-transform:uppercase;font-weight:500;}
  .hdr-wmark{position:absolute;top:6%;right:5%;opacity:0.12;width:20%;}
  .hdr-wmark img{width:100%;height:auto;}
  .hdr-sub{font-size:1.6em;font-weight:300;letter-spacing:0.08em;margin-bottom:5%;opacity:0.92;}
  .hdr .tkr{font-size:2.8em;font-weight:700;line-height:1.25;margin-bottom:0.3em;}
  .hdr .ten{font-size:1.3em;font-weight:600;opacity:0.85;letter-spacing:0.03em;margin-bottom:0.8em;}
  .hdr .sub{font-size:0.7em;opacity:0.45;letter-spacing:0.04em;}
  .body{flex:0 0 67%;background:#fff;color:#1a1a1a;padding:5% 8%;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;text-align:center;font-size:1.1em;line-height:2;font-weight:500;}
  .body .hl{color:#ED5B3F;font-weight:700;}
  .body .divider{width:50%;height:1px;background:#B79F8A;margin:2em auto;opacity:0.4;}
  .ftr{flex:0 0 5%;background:#221F20;display:flex;align-items:center;justify-content:center;gap:8px;}
  .ftr img{height:35%;}
  .ftr span{color:#B79F8A;font-size:0.85em;font-weight:600;letter-spacing:0.18em;}
  @media print{
    .ctrl{display:none!important;}
    body{background:#fff!important;}
    .page-wrap{display:contents!important;padding:0!important;}
    .page{box-shadow:none!important;margin:0!important;width:100vw!important;height:100vh!important;}
  }
  [contenteditable]:focus{outline:2px dashed #B79F8A;outline-offset:4px;border-radius:4px;}
  [contenteditable]:empty::before{content:attr(data-placeholder);opacity:0.3;}
</style>

<div class="ctrl">
  <span class="label">사업부</span>
  <select id="brandSel" onchange="changeBrand()">

  <button class="primary" onclick="doPrint()">인쇄 / PDF 저장</button>
</div>

    </div>
    <div class="ftr">

      <span>WELLPERION</span>
    </div>
  </div>
</div>
