<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웰페리온 업무 현황 SSOT</title>
<style>
:root{--bg:#221F20;--paper:#2a2725;--text:#f5f2ef;--dim:#8c8b83;--accent:#B79F8A;--accent-bg:rgba(183,159,138,0.12);--border:#3d3835;--green:#6abf7b;--green-bg:rgba(106,191,123,0.12);--red:#ED5B3F;--red-bg:rgba(237,91,63,0.12);--yellow:#e6c84e;--yellow-bg:rgba(230,200,78,0.12);--blue:#5b9fd5;--blue-bg:rgba(91,159,213,0.12);--purple:#a78bda;--purple-bg:rgba(167,139,218,0.12);--orange:#e6944e;--orange-bg:rgba(230,148,78,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:15px;min-height:100vh}

/* ── Header ── */
.header{background:var(--paper);border-bottom:none;padding:10px 20px}
.header-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.header h1{font-size:17px;font-weight:700;margin:0;white-space:nowrap}
.header .sub{font-size:12px;color:var(--dim);margin-top:2px}
.header-right{display:flex;gap:6px;margin-left:auto;align-items:center;flex-wrap:wrap}
.user-select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer}
.sheet-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:var(--accent-bg);color:var(--accent);border:1px solid rgba(183,159,138,0.3);text-decoration:none;white-space:nowrap;cursor:pointer;transition:background 0.15s}
.sheet-link:hover{background:rgba(183,159,138,0.22)}
.sheet-link svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}

/* ── Filter Bar ── */
.sticky-top{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.filter-bar{background:var(--bg);padding:8px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-row{display:flex;gap:4px;flex-wrap:nowrap;margin-bottom:6px;min-width:max-content}
.filter-row:last-child{margin-bottom:0}
.filter-btn{padding:6px 12px;font-size:12px;font-weight:600;color:var(--dim);background:none;border:1px solid transparent;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.filter-btn.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(183,159,138,0.3)}
.filter-btn:hover{background:var(--accent-bg)}
.filter-btn.approval-filter.active{background:var(--red-bg);color:var(--red);border-color:rgba(237,91,63,0.3)}
.share-btn{padding:6px 12px;font-size:12px;font-weight:600;color:var(--blue);background:var(--blue-bg);border:1px solid rgba(91,159,213,0.3);border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:auto;flex-shrink:0;transition:all 0.15s}
.share-btn:hover{background:rgba(91,159,213,0.22)}

/* ── Content ── */
.content{padding:16px 20px 100px;max-width:720px;margin:0 auto}
.loading{text-align:center;padding:40px;color:var(--dim)}
.empty-msg{text-align:center;padding:40px 20px;color:var(--dim);font-size:14px}

/* ── Add Button ── */
.add-bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;justify-content:center;z-index:100}
.add-btn{padding:12px 24px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff;flex:1;max-width:400px;transition:opacity 0.15s}
.add-btn:hover{opacity:0.85}

/* ── Accordion / Category Group ── */
.cat-group{margin-bottom:12px}
.cat-accordion{background:var(--paper);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cat-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background 0.1s}
.cat-header:hover{background:var(--accent-bg)}
.cat-title{font-size:14px;font-weight:700}
.cat-count{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:var(--accent-bg);color:var(--accent)}
.cat-arrow{font-size:12px;color:var(--dim);transition:transform 0.2s;margin-left:8px}
.cat-arrow.open{transform:rotate(90deg)}
.cat-body{border-top:1px solid var(--border);display:none}
.cat-body.open{display:block}

/* ── Task Card ── */
.task-card{padding:14px 16px;border-bottom:1px solid rgba(61,56,53,0.4);transition:background 0.1s}
.task-card:last-child{border-bottom:none}
.task-card:hover{background:rgba(183,159,138,0.04)}
.task-detail.open{display:block!important}
.toggle-arrow.open{transform:rotate(90deg)}
.task-top{display:flex;align-items:flex-start;gap:10px}
.task-info{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:700;margin-bottom:4px;word-break:break-word}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.chip.owner{background:var(--blue-bg);color:var(--blue)}
.chip.date-chip{background:var(--accent-bg);color:var(--accent);cursor:pointer}
.chip.date-chip:hover{background:rgba(183,159,138,0.25)}
.chip.overdue{background:var(--red-bg);color:var(--red);font-weight:700}
.chip.due-today{background:var(--red-bg);color:var(--red);font-weight:700;animation:pulse-due 1.6s ease-in-out infinite}
.chip.due-soon{background:var(--yellow-bg);color:var(--yellow);font-weight:700}
.chip.due-warn{background:var(--accent-bg);color:var(--accent);font-weight:600}
.chip.due-ok{background:var(--green-bg);color:var(--green)}
@keyframes pulse-due{0%,100%{opacity:1}50%{opacity:0.55}}
.task-card.is-due-soon{border-left:3px solid var(--yellow)}
.task-card.is-due-warn{border-left:3px solid var(--accent)}
.task-card.is-overdue{border-left:3px solid var(--red);background:rgba(237,91,63,0.04)}
.task-card.is-due-today{border-left:3px solid var(--red);background:rgba(237,91,63,0.06)}
.chip.approval{background:var(--purple-bg);color:var(--purple)}
.chip.link-chip{background:var(--green-bg);color:var(--green);cursor:pointer;text-decoration:none}
.chip.link-chip:hover{background:rgba(106,191,123,0.22)}
.task-content{font-size:12px;color:var(--dim);line-height:1.5;white-space:pre-line;margin-bottom:6px}
.task-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.action-btn{font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit;border:1px solid;font-weight:600;transition:opacity 0.15s;white-space:nowrap}
.action-btn:hover{opacity:0.8}
.action-btn.edit{background:var(--accent-bg);color:var(--accent);border-color:rgba(183,159,138,0.3)}
.action-btn.done{background:var(--green-bg);color:var(--green);border-color:rgba(106,191,123,0.3)}
.action-btn.delete{background:var(--red-bg);color:var(--red);border-color:rgba(237,91,63,0.3)}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--paper);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px 20px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent)}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--dim);margin-bottom:4px}
.field input[type=text],.field input[type=url],.field input[type=date],.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical}
.field textarea{min-height:220px;line-height:1.6}
#fContent{min-height:280px;font-size:14px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.checkbox-group label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);transition:all 0.15s;user-select:none}
.checkbox-group label:has(input:checked){background:var(--blue-bg);border-color:rgba(91,159,213,0.3);color:var(--blue)}
.checkbox-group input[type=checkbox]{accent-color:var(--blue);cursor:pointer}
.approval-group{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.approval-group label{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);transition:all 0.15s;user-select:none}
.approval-group label:has(input:checked){background:var(--purple-bg);border-color:rgba(167,139,218,0.3);color:var(--purple)}
.approval-group input[type=checkbox]{accent-color:var(--purple);cursor:pointer}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid;transition:opacity 0.15s}
.modal-btn:hover{opacity:0.85}
.modal-btn.save{background:var(--accent);color:#fff;border-color:var(--accent)}
.modal-btn.cancel{background:var(--paper);color:var(--dim);border-color:var(--border)}

/* ── Done Log ── */
.done-log{background:var(--paper);border:1px solid var(--border);border-radius:12px;margin-top:20px;overflow:hidden}
.done-log-header{padding:14px 18px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.done-log-header:hover{background:var(--accent-bg)}
.done-log-header h3{font-size:15px;font-weight:700;margin:0;color:var(--green)}
.done-log-body{border-top:1px solid var(--border);display:none}
.done-log-body.open{display:block}
.done-card{padding:12px 16px;border-bottom:1px solid rgba(61,56,53,0.3);opacity:0.7}
.done-card:last-child{border-bottom:none}
.done-card .task-title{text-decoration:line-through;color:var(--dim)}

/* ── Toast ── */
.toast{position:fixed;top:70px;right:20px;background:var(--green-bg);color:var(--green);padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;display:none;z-index:300;border:1px solid rgba(106,191,123,0.3)}
.toast.error{background:var(--red-bg);color:var(--red);border-color:rgba(237,91,63,0.3)}

/* ── Date Picker Modal ── */
.date-picker-modal .modal{max-width:320px}

/* ── Dashboard ── */
.dashboard-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.dashboard-overlay.show{display:flex}
.dashboard-panel{background:var(--paper);border:1px solid var(--border);border-radius:16px;width:100%;max-width:700px;margin:40px auto;padding:28px 24px}
.dashboard-panel h2{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.dashboard-panel h2 .close-dash{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 8px}
.dashboard-panel h3{font-size:15px;font-weight:700;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.dash-table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0 16px}
.dash-table th,.dash-table td{padding:8px 10px;text-align:left;border:1px solid var(--border)}
.dash-table th{background:var(--bg);font-weight:700;color:var(--accent);font-size:12px}
.dash-table td{vertical-align:middle}
.dash-bar-wrap{height:16px;background:var(--bg);border-radius:8px;overflow:hidden;min-width:60px}
.dash-bar{height:100%;border-radius:8px;transition:width 0.3s}
.dash-bar.green{background:var(--green)}
.dash-bar.blue{background:var(--blue)}
.dash-bar.accent{background:var(--accent)}
.dash-bar.red{background:var(--red)}
.dash-bar.yellow{background:var(--yellow)}
.dash-bar.purple{background:var(--purple)}
.dash-stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
.dash-stat-card{flex:1;min-width:100px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.dash-stat-card .num{font-size:24px;font-weight:700;color:var(--accent)}
.dash-stat-card .label{font-size:11px;color:var(--dim);margin-top:2px}
.dash-print-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.dash-print-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Print ── */
@media print{
  @page{margin:10mm;size:A4}
  body{background:#fff;color:#222;font-size:11px;line-height:1.4}
  .header,.filter-bar,.add-bar,.action-btn,.modal-overlay,.toast,.share-btn,.sheet-link,.print-tasks-btn{display:none!important}
  .content{padding:0;max-width:100%}
  .cat-accordion{border:1px solid #ccc;break-inside:avoid;margin-bottom:8px}
  .cat-header{padding:8px 12px}
  .cat-body{display:block!important}
  .task-card{border-bottom:1px solid #eee;padding:8px 12px;break-inside:avoid}
  .chip{border:1px solid #ccc;background:#f5f5f5;color:#333}
  .done-log-body{display:block!important}
  /* 대시보드 모드: 업무 목록 숨김 */
  [data-print-mode="dashboard"] .content{display:none!important}
  [data-print-mode="dashboard"] .dashboard-overlay{position:static!important;display:block!important;background:none!important;padding:0!important}
  [data-print-mode="dashboard"] .dashboard-panel{border:none!important;margin:0!important;padding:10px!important;max-width:100%!important}
  /* 업무 모드: 대시보드 숨김 */
  [data-print-mode="tasks"] .dashboard-overlay{display:none!important}
  [data-print-mode="tasks"] .content{display:block!important}
  /* 공통 대시보드 */
  .dashboard-panel h2 .close-dash,.dash-print-btn{display:none!important}
  .dash-table th,.dash-table td{border:1px solid #ccc;padding:4px 8px;font-size:10px}
  .dash-bar-wrap{background:#eee!important}
  .dash-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .dash-stat-card{border:1px solid #ccc;background:#f9f9f9!important;break-inside:avoid}
  .dash-stat-card .num{color:#333!important}
}

/* ── Mobile ── */
@media(max-width:720px){
  .header h1{font-size:15px}
  .header-right{width:100%;margin-left:0;margin-top:6px}
  .user-select{flex:1}
  .filter-bar{padding:6px 12px}
  .content{padding:12px 12px 100px}
  .modal{padding:20px 16px;margin:10px}
  .field-row{flex-direction:column;gap:0}
  .task-top{flex-direction:column;gap:6px}
  .task-actions{width:100%}
  .action-btn{flex:1;text-align:center}
}
</style>
</head>
<body>

<div class="sticky-top">
<div class="header">
  <div class="header-top">
    <h1>웰페리온 업무 현황 SSOT</h1>
    <div class="header-right">
      <a class="sheet-link" onclick="openDashboard()" style="cursor:pointer;background:var(--purple-bg);color:var(--purple);border-color:rgba(167,139,218,0.3);">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        현황 대시보드
      </a>
      <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1aqZGHpxzjAMqQvWQDrBWxrVtrFdZhFMxqFudNFlGnTk/edit" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
        시트
      </a>
      <a class="sheet-link" href="../wellperion_guide(main).html">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        가이드허브
      </a>
    </div>
  </div>
  <div class="sub" id="headerSub"></div>
</div>

<div class="filter-bar">
  <div class="filter-row" id="ownerFilters"></div>
  <div class="filter-row" id="catFilters"></div>
</div>
</div><!-- /sticky-top -->

<div class="toast" id="toast"></div>

<div class="content" id="mainContent">
  <div class="loading">불러오는 중...</div>
</div>

<div class="add-bar">
  <button class="add-btn" onclick="openAddModal()">+ 업무 추가</button>
</div>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2 id="modalTitle">업무 추가</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>업무명 *</label>
      <input type="text" id="fTitle" placeholder="업무명을 입력하세요">
    </div>
    <div class="field">
      <label>카테고리</label>
      <select id="fCategory">
        <option value="">선택</option>
        <option value="[1] 매출 및 영업">[1] 매출 및 영업</option>
        <option value="[2] 인사 & 파트너">[2] 인사 & 파트너</option>
        <option value="[3] 운영 정책">[3] 운영 정책</option>
        <option value="[4] 시설 및 환경">[4] 시설 및 환경</option>
        <option value="[5] 대표님 하달">[5] 대표님 하달</option>
        <option value="[6] 회장님 하달">[6] 회장님 하달</option>
      </select>
    </div>
    <div class="field">
      <label>담당자 (복수 선택)</label>
      <div class="checkbox-group" id="fOwnerGroup">
        <label><input type="checkbox" value="김남욱GM">김남욱GM</label>
        <label><input type="checkbox" value="이경연 실장">이경연 실장</label>
        <label><input type="checkbox" value="최준용M">최준용M</label>
        <label><input type="checkbox" value="임정은M">임정은M</label>
        <label><input type="checkbox" value="윤병현AM">윤병현AM</label>
        <label><input type="checkbox" value="이지영 사원">이지영 사원</label>
        <label><input type="checkbox" value="나우열M">나우열M</label>
        <label><input type="checkbox" value="이정헌 소장">이정헌 소장</label>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>시작일</label>
        <input type="date" id="fStartDate">
      </div>
      <div class="field">
        <label>종료일</label>
        <input type="date" id="fEndDate">
      </div>
    </div>
    <div class="field">
      <label>업무 내용 <span style="font-size:11px;color:var(--dim);font-weight:400;">(정의·맥락·산출물)</span></label>
      <textarea id="fContent" placeholder="이 업무의 정의·맥락·기대 산출물을 입력하세요"></textarea>
    </div>
    <div class="field" style="background:var(--accent-bg);padding:12px 14px;border-radius:8px;border:1px solid rgba(183,159,138,0.3);">
      <label style="display:flex;align-items:center;justify-content:space-between;color:var(--accent);font-weight:700;">
        <span>📅 진척 로그 <span style="font-size:11px;color:var(--dim);font-weight:400;">(매일 한 줄씩 누적 — 보고 자동 연계)</span></span>
      </label>
      <div id="progressLogList" style="margin:8px 0;"></div>
      <div style="display:flex;gap:6px;align-items:stretch;margin-top:8px;">
        <input type="date" id="progressLogDate" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;font-family:inherit;flex-shrink:0;">
        <input type="text" id="progressLogInput" placeholder="오늘 진척 한 줄 (예: UI 80% / 검수 필요)" onkeydown="if(event.key==='Enter'){event.preventDefault();addProgressLogEntry();}" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;font-family:inherit;flex:1;">
        <button type="button" onclick="addProgressLogEntry()" style="background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0;">+ 추가</button>
      </div>
    </div>
    <div class="field">
      <label>노션 링크</label>
      <input type="url" id="fLink" placeholder="https://www.notion.so/...">
    </div>
    <div class="field">
      <label>첨부파일 <span style="font-size:11px;color:var(--dim);font-weight:400;">(최대 5MB)</span></label>
      <input type="file" id="fFile" multiple style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-family:inherit;font-size:14px;width:100%;">
      <div id="fFileStatus" style="font-size:12px;color:var(--dim);margin-top:4px;"></div>
    </div>
    <div class="field">
      <label>결재요청</label>
      <div class="approval-group" id="fApprovalGroup">
        <label><input type="checkbox" value="부서장">부서장</label>
        <label><input type="checkbox" value="GM">GM</label>
        <label><input type="checkbox" value="대표님">대표님</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn save" id="modalSaveBtn" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>

<!-- Date Picker Modal -->
<div class="modal-overlay date-picker-modal" id="datePickerModal">
  <div class="modal">
    <h2 id="datePickerTitle">날짜 변경</h2>
    <input type="hidden" id="datePickerId">
    <input type="hidden" id="datePickerField">
    <div class="field">
      <label id="datePickerLabel">날짜</label>
      <input type="date" id="datePickerValue">
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeDatePicker()">취소</button>
      <button class="modal-btn save" onclick="saveDatePicker()">저장</button>
    </div>
  </div>
</div>

<!-- Dashboard Overlay -->
<div class="dashboard-overlay" id="dashboardOverlay">
  <div class="dashboard-panel" id="dashboardPanel"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   Constants
   ═══════════════════════════════════════════ */
const TODO_API_URL = 'https://script.google.com/macros/s/AKfycbxDwFkrxK1YIaEoSNcuw2MiHiZQ-7o5N6311ytksSyeEd86ZFOhLknOWqQgNArQvZ-7/exec';

const MEMBERS = ['김남욱GM','이경연 실장','나우열M','최준용M','임정은M','윤병현AM','이지영 사원','이정헌 소장'];

const CATEGORIES = [
  '[1] 매출 및 영업','[2] 인사 & 파트너','[3] 운영 정책',
  '[4] 시설 및 환경','[5] 대표님 하달','[6] 회장님 하달'
];

const CAT_COLORS = {
  '[1] 매출 및 영업':  {bg:'var(--blue-bg)',   color:'var(--blue)'},
  '[2] 인사 & 파트너': {bg:'var(--purple-bg)', color:'var(--purple)'},
  '[3] 운영 정책':    {bg:'var(--accent-bg)', color:'var(--accent)'},
  '[4] 시설 및 환경':  {bg:'var(--green-bg)',  color:'var(--green)'},
  '[5] 대표님 하달':     {bg:'var(--yellow-bg)', color:'var(--yellow)'},
  '[6] 회장님 하달':  {bg:'var(--red-bg)',    color:'var(--red)'}
};

/* field mapping: API 한글 → 영문 */
const FIELD_MAP = {
  '업무명':'title','담당자':'owner','카테고리':'category',
  '내용':'content','시작일':'startDate','종료일':'endDate',
  '상태':'status','결재요청':'approval','링크':'link',
  '파일URL':'fileUrl','생성자':'creator','id':'id',
  '생성일':'createdAt','수정일':'updatedAt'
};

/* ═══════════════════════════════════════════
   State
   ═══════════════════════════════════════════ */
let ALL_TASKS = [];
let activeOwnerFilter = '전체';
let activeCatFilter = '전체';
let doneLogOpen = false;

/* ═══════════════════════════════════════════
   Init
   ═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  updateHeaderSub();
  buildFilters();
  loadTasks();

  // Close modals on overlay click
  document.getElementById('taskModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('datePickerModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDatePicker();
  });
});

/* ═══════════════════════════════════════════
   User select
   ═══════════════════════════════════════════ */
function getUser() {
  return '김남욱GM';
}

function updateHeaderSub() {
  const u = getUser();
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  const ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  document.getElementById('headerSub').textContent = ds + ' (' + days[now.getDay()] + ')' + (u ? ' | ' + u : '');
}

/* ═══════════════════════════════════════════
   Filters
   ═══════════════════════════════════════════ */
function buildFilters() {
  // Owner filters
  const ownerEl = document.getElementById('ownerFilters');
  let html = '<button class="filter-btn active" onclick="setOwnerFilter(\'전체\',this)">전체</button>';
  MEMBERS.forEach(m => {
    html += '<button class="filter-btn" onclick="setOwnerFilter(\'' + escAttr(m) + '\',this)">' + esc(m) + '</button>';
  });
  html += '<button class="filter-btn approval-filter" onclick="setOwnerFilter(\'대표님 결재건\',this)">대표님 결재건</button>';
  html += '<div style="display:flex;gap:4px;margin-left:auto;">';
  html += '<button class="share-btn" onclick="printTasks()" style="background:var(--accent-bg);color:var(--accent);border-color:rgba(183,159,138,0.3);">인쇄</button>';
  html += '<button class="share-btn" onclick="shareReport()" style="background:var(--purple-bg);color:var(--purple);border-color:rgba(167,139,218,0.3);">보고용</button>';
  html += '<button class="share-btn" onclick="shareList()">공유용</button>';
  html += '</div>';
  ownerEl.innerHTML = html;

  // Category filters
  const catEl = document.getElementById('catFilters');
  html = '<button class="filter-btn active" onclick="setCatFilter(\'전체\',this)">전체</button>';
  CATEGORIES.forEach(c => {
    html += '<button class="filter-btn" onclick="setCatFilter(\'' + escAttr(c) + '\',this)">' + esc(c) + '</button>';
  });
  catEl.innerHTML = html;
}

function setOwnerFilter(v, btn) {
  activeOwnerFilter = v;
  document.querySelectorAll('#ownerFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

function setCatFilter(v, btn) {
  activeCatFilter = v;
  document.querySelectorAll('#catFilters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
}

/* ═══════════════════════════════════════════
   API
   ═══════════════════════════════════════════ */
function apiCall(params) {
  const qs = Object.keys(params).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(params[k])).join('&');
  return fetch(TODO_API_URL + '?' + qs, { redirect: 'follow' })
    .then(r => r.json());
}

async function loadTasks() {
  const el = document.getElementById('mainContent');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await apiCall({ action: 'todo_list' });
    if (res.ok) {
      ALL_TASKS = (res.data || []).map(normalizeTask);
      saveFallback();
    } else {
      throw new Error(res.error || 'API 오류');
    }
  } catch (e) {
    // localStorage fallback
    ALL_TASKS = loadFallback();
    showToast('네트워크 오류: 로컬 데이터 표시 중', true);
  }
  renderTasks();
}

function normalizeTask(raw) {
  const t = {};
  Object.keys(raw).forEach(k => {
    const en = FIELD_MAP[k] || k;
    t[en] = raw[k] || '';
  });
  // Ensure english field names exist
  if (!t.id) t.id = raw.id || '';
  if (!t.title) t.title = raw.title || raw['업무명'] || '';
  if (!t.category) t.category = raw.category || raw['카테고리'] || '';
  if (!t.owner) t.owner = raw.owner || raw['담당자'] || '';
  if (!t.startDate) t.startDate = raw.startDate || raw['시작일'] || '';
  if (!t.endDate) t.endDate = raw.endDate || raw['종료일'] || '';
  if (!t.content) t.content = raw.content || raw['내용'] || '';
  if (!t.status) t.status = raw.status || raw['상태'] || '진행중';
  if (!t.approval) t.approval = raw.approval || raw['결재요청'] || '';
  if (!t.link) t.link = raw.link || raw['링크'] || '';
  if (!t.creator) t.creator = raw.creator || raw['생성자'] || '';
  return t;
}

function saveFallback() {
  try { localStorage.setItem('todo_tasks', JSON.stringify(ALL_TASKS)); } catch(e) {}
}

function loadFallback() {
  try { return JSON.parse(localStorage.getItem('todo_tasks') || '[]'); } catch(e) { return []; }
}

/* ═══════════════════════════════════════════
   Render
   ═══════════════════════════════════════════ */
function renderTasks() {
  const el = document.getElementById('mainContent');
  const active = ALL_TASKS.filter(t => t.status !== '완료' && t.status !== '보류');
  const hold = ALL_TASKS.filter(t => t.status === '보류');
  const done = ALL_TASKS.filter(t => t.status === '완료');

  // Apply filters to active
  let filtered = active;
  if (activeOwnerFilter === '대표님 결재건') {
    filtered = active.filter(t => (t.approval || '').includes('대표님'));
  } else if (activeOwnerFilter !== '전체') {
    filtered = active.filter(t => (t.owner || '').includes(activeOwnerFilter));
  }
  if (activeCatFilter !== '전체') {
    filtered = filtered.filter(t => t.category === activeCatFilter);
  }

  if (filtered.length === 0 && done.length === 0) {
    el.innerHTML = '<div class="empty-msg">등록된 업무가 없습니다.<br>아래 "+ 업무 추가" 버튼으로 시작하세요.</div>';
    return;
  }

  // Group by category
  const groups = {};
  const catOrder = ['[1] 매출 및 영업','[2] 인사 & 파트너','[3] 운영 정책','[4] 시설 및 환경','[5] 대표님 하달','[6] 회장님 하달',''];
  filtered.forEach(t => {
    const cat = t.category || '';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  let html = '';

  var globalIdx = 1;
  if (filtered.length === 0) {
    html += '<div class="empty-msg">필터 조건에 맞는 업무가 없습니다.</div>';
  } else {
    catOrder.forEach(cat => {
      if (!groups[cat] || groups[cat].length === 0) return;
      var result = renderCatGroup(cat, groups[cat], globalIdx);
      html += result.html;
      globalIdx = result.nextIdx;
    });
    Object.keys(groups).forEach(cat => {
      if (catOrder.includes(cat)) return;
      var result = renderCatGroup(cat, groups[cat], globalIdx);
      html += result.html;
      globalIdx = result.nextIdx;
    });
  }

  // 보류 로그
  const filteredHold = filterByStatus(hold);
  html += '<div class="done-log" id="holdLogSection" style="margin-top:20px;">';
  html += '<div class="done-log-header" onclick="toggleHoldLog()" style="border-left:3px solid var(--orange);">';
  html += '<h3 style="color:var(--orange);">⏸ 보류 (' + filteredHold.length + '건)<span style="font-size:11px;font-weight:500;color:var(--dim);margin-left:8px;">눌러서 펼침</span></h3>';
  html += '<span class="cat-arrow' + (holdLogOpen ? ' open' : '') + '">&#9654;</span>';
  html += '</div>';
  html += '<div class="done-log-body' + (holdLogOpen ? ' open' : '') + '" id="holdLogBody">';
  if (filteredHold.length === 0) {
    html += '<div class="empty-msg" style="padding:20px">보류된 업무가 없습니다.</div>';
  } else {
    filteredHold.forEach(t => {
      html += '<div class="done-card" style="opacity:0.8;">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;">';
      html += '<div><div class="task-title" style="text-decoration:none;color:var(--orange);">' + esc(t.title) + '</div>';
      html += '<div class="task-meta">';
      if (t.owner) t.owner.split(',').forEach(o => { o=o.trim(); if(o) html += '<span class="chip owner">'+esc(o)+'</span>'; });
      if (t.category) html += '<span class="chip" style="background:var(--orange-bg);color:var(--orange)">'+esc(t.category)+'</span>';
      html += '</div></div>';
      html += '<button class="action-btn" onclick="restoreTask(\''+escAttr(t.id)+'\')" style="padding:4px 10px;font-size:11px;background:var(--blue-bg);color:var(--blue);border-color:rgba(91,159,213,0.3);">복원</button>';
      html += '</div></div>';
    });
  }
  html += '</div></div>';

  // 완료 로그
  const filteredDone = filterDone(done);
  html += '<div class="done-log" id="doneLogSection">';
  html += '<div class="done-log-header" onclick="toggleDoneLog()">';
  html += '<h3>완료 로그 (' + filteredDone.length + '건)</h3>';
  html += '<span class="cat-arrow' + (doneLogOpen ? ' open' : '') + '">&#9654;</span>';
  html += '</div>';
  html += '<div class="done-log-body' + (doneLogOpen ? ' open' : '') + '">';
  if (filteredDone.length === 0) {
    html += '<div class="empty-msg" style="padding:20px">완료된 업무가 없습니다.</div>';
  } else {
    filteredDone.sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
    filteredDone.forEach(t => { html += renderDoneCard(t); });
  }
  html += '</div></div>';

  el.innerHTML = html;
}

function filterDone(done) {
  let filtered = done;
  if (activeOwnerFilter === '대표님 결재건') {
    filtered = done.filter(t => (t.approval || '').includes('대표님'));
  } else if (activeOwnerFilter !== '전체') {
    filtered = done.filter(t => (t.owner || '').includes(activeOwnerFilter));
  }
  if (activeCatFilter !== '전체') {
    filtered = filtered.filter(t => t.category === activeCatFilter);
  }
  return filtered;
}

function renderCatGroup(cat, tasks, startIdx) {
  const label = cat || '미분류';
  const colors = CAT_COLORS[cat] || { bg: 'var(--accent-bg)', color: 'var(--accent)' };
  let html = '<div class="cat-group"><div class="cat-accordion">';
  html += '<div class="cat-header" onclick="toggleCat(this)" style="border-left:3px solid ' + colors.color + '">';
  html += '<span class="cat-title">' + esc(label) + '</span>';
  html += '<div><span class="cat-count">' + tasks.length + '건</span>';
  html += '<span class="cat-arrow open">&#9654;</span></div>';
  html += '</div>';
  html += '<div class="cat-body open">';
  var idx = startIdx || 1;
  tasks.forEach(t => { html += renderTaskCard(t, idx++); });
  html += '</div></div></div>';
  return { html: html, nextIdx: idx };
}

function filterByStatus(list) {
  let filtered = list;
  if (activeOwnerFilter === '대표님 결재건') {
    filtered = list.filter(t => (t.approval || '').includes('대표님'));
  } else if (activeOwnerFilter !== '전체') {
    filtered = list.filter(t => (t.owner || '').includes(activeOwnerFilter));
  }
  if (activeCatFilter !== '전체') {
    filtered = filtered.filter(t => t.category === activeCatFilter);
  }
  return filtered;
}

function renderTaskCard(t, idx) {
  // 마감 임박 카드 시각 강조 (옵션 A · 2026-05-28)
  const cardBadge = t.endDate ? getDeadlineBadge(t.endDate) : null;
  let cardClass = 'task-card';
  if (cardBadge) {
    if (cardBadge.cls === 'overdue')   cardClass += ' is-overdue';
    else if (cardBadge.cls === 'due-today') cardClass += ' is-due-today';
    else if (cardBadge.cls === 'due-soon')  cardClass += ' is-due-soon';
    else if (cardBadge.cls === 'due-warn')  cardClass += ' is-due-warn';
  }
  let html = '<div class="' + cardClass + '" data-id="' + escAttr(t.id) + '">';

  // 제목줄: 번호 + 토글 화살표 + 제목 + 칩 + 편집/완료 버튼
  html += '<div class="task-summary" style="display:flex;align-items:center;gap:8px;">';
  html += '<span style="font-size:12px;font-weight:700;color:var(--accent);min-width:24px;text-align:center;flex-shrink:0;">' + idx + '</span>';
  html += '<span class="toggle-arrow" onclick="this.closest(\'.task-card\').querySelector(\'.task-detail\').classList.toggle(\'open\');this.classList.toggle(\'open\');" style="font-size:10px;color:var(--dim);transition:transform 0.2s;flex-shrink:0;cursor:pointer;padding:4px;">▶</span>';
  html += '<div style="flex:1;min-width:0;cursor:pointer;" onclick="this.closest(\'.task-card\').querySelector(\'.task-detail\').classList.toggle(\'open\');this.closest(\'.task-card\').querySelector(\'.toggle-arrow\').classList.toggle(\'open\');">';
  html += '<div class="task-title" style="display:inline;">' + esc(t.title) + '</div>';
  html += '<div class="task-meta" style="margin-top:4px;">';

  if (t.owner) {
    t.owner.split(',').forEach(o => {
      o = o.trim();
      if (o) html += '<span class="chip owner">' + esc(o) + '</span>';
    });
  }

  if (t.startDate || t.endDate) {
    const dateStr = formatDateRange(t.startDate, t.endDate);
    html += '<span class="chip date-chip" onclick="event.stopPropagation();openDateRangePicker(\'' + escAttr(t.id) + '\',\'' + escAttr(t.startDate || '') + '\',\'' + escAttr(t.endDate || '') + '\')" title="클릭하여 시작일·종료일 변경">' + esc(dateStr) + '</span>';
  }

  if (t.endDate) {
    const badge = getDeadlineBadge(t.endDate);
    if (badge) html += '<span class="chip ' + badge.cls + '">' + badge.text + '</span>';
  }

  if (t.approval) {
    t.approval.split(',').forEach(a => {
      a = a.trim();
      if (a) html += '<span class="chip approval">' + esc(a) + '</span>';
    });
    html += '<span class="chip" style="background:#229ED9;color:#fff;cursor:pointer;" onclick="event.stopPropagation();sendToTelegram(\'' + escAttr(t.id) + '\')">텔레그램 결재</span>';
  }

  html += '</div>'; // task-meta
  html += '</div>';

  // 제목줄 우측: 편집 + 완료 + 보류
  html += '<div style="display:flex;gap:4px;flex-shrink:0;">';
  html += '<button class="action-btn edit" onclick="event.stopPropagation();openEditModal(\'' + escAttr(t.id) + '\')" style="padding:4px 10px;font-size:11px;">편집</button>';
  html += '<button class="action-btn done" onclick="event.stopPropagation();markDone(\'' + escAttr(t.id) + '\')" style="padding:4px 10px;font-size:11px;">완료</button>';
  html += '<button class="action-btn" onclick="event.stopPropagation();holdTask(\'' + escAttr(t.id) + '\')" style="padding:4px 10px;font-size:11px;background:var(--orange-bg);color:var(--orange);border-color:rgba(230,148,78,0.3);">보류</button>';
  html += '</div>';
  html += '</div>'; // task-summary

  // 토글 영역: 내용 + 진척 로그 + 링크 + 첨부
  html += '<div class="task-detail" style="display:none;padding:10px 0 0 18px;border-top:1px dashed var(--border);margin-top:8px;">';

  const parsed = parseContent(t.content);
  if (parsed.body) {
    html += '<div class="task-content" style="white-space:pre-wrap;line-height:1.55;">' + esc(parsed.body) + '</div>';
  } else if (!parsed.logs.length) {
    html += '<div class="task-content" style="color:var(--dim);font-style:italic;">내용 없음</div>';
  }

  if (parsed.logs.length) {
    html += '<div style="margin-top:10px;">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;">📅 진척 로그 (' + parsed.logs.length + '건)</div>';
    const recent = parsed.logs.slice(0, 5);
    recent.forEach(log => {
      html += '<div style="display:flex;gap:8px;align-items:flex-start;padding:6px 10px;border-left:3px solid var(--accent);background:var(--accent-bg);border-radius:6px;margin-bottom:4px;">';
      html += '<span style="font-size:12px;font-weight:700;color:var(--accent);min-width:88px;flex-shrink:0;">' + esc(log.date) + '</span>';

/* ═══════════════════════════════════════════
   Helpers
   ═══════════════════════════════════════════ */
function formatDateRange(s, e) {
  if (s && e) return fmtDate(s) + ' ~ ' + fmtDate(e);
  if (s) return fmtDate(s) + ' ~';
  if (e) return '~ ' + fmtDate(e);
  return '';
}

function fmtDate(d) {
  if (!d) return '';
  const str = String(d);
  // Handle various date formats
  if (str.length >= 10) return str.slice(0, 10);
  return str;
}

function getDeadlineBadge(endDate) {
  if (!endDate) return null;
  const end = new Date(String(endDate).slice(0, 10) + 'T23:59:59');
  const now = new Date();
  const diff = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
  if (diff < 0)   return { cls: 'overdue',   text: 'D+' + Math.abs(diff) + ' 지연' };
  if (diff === 0) return { cls: 'due-today', text: '🔴 D-Day 마무리' };
  if (diff <= 3)  return { cls: 'due-soon',  text: '⚡ D-' + diff + ' 임박' };
  if (diff <= 7)  return { cls: 'due-warn',  text: '⏰ D-' + diff + ' 마무리' };
  return { cls: 'due-ok', text: 'D-' + diff };
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════
   진척 로그 (옵션 B · 2026-05-28)
   content 필드 안에 ===PROGRESS_LOG=== 구분선으로 누적
   ═══════════════════════════════════════════ */
const PROGRESS_MARK = '===PROGRESS_LOG===';

function parseContent(content) {
  const raw = String(content || '');
  const idx = raw.indexOf(PROGRESS_MARK);
  if (idx < 0) return { body: raw, logs: [] };
  const body = raw.slice(0, idx).replace(/\s+$/, '');
  const block = raw.slice(idx + PROGRESS_MARK.length).trim();
  const logs = block.split(/\r?\n/).map(line => {
    const m = line.match(/^(\d{4}-\d{2}-\d{2})\s*\|\s*(.*)$/);
    return m ? { date: m[1], text: m[2].trim() } : null;
  }).filter(Boolean);
  // 최신 날짜가 위로
  logs.sort((a, b) => b.date.localeCompare(a.date));
  return { body, logs };
}

function composeContent(body, logs) {
  const b = String(body || '').replace(/\s+$/, '');
  if (!logs || !logs.length) return b;
  // 누적 보존을 위해 시간순(과거→현재)으로 저장
  const sorted = logs.slice().sort((a, b) => a.date.localeCompare(b.date));
  const block = sorted.map(l => l.date + ' | ' + l.text).join('\n');
  return (b ? b + '\n\n' : '') + PROGRESS_MARK + '\n' + block;
}

function todayDateStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

let modalLogsCache = [];

function renderProgressList() {
  const el = document.getElementById('progressLogList');
  if (!el) return;
  if (!modalLogsCache.length) {
    el.innerHTML = '<div style="color:var(--dim);font-size:13px;padding:8px 0;font-style:italic;">아직 진척 로그가 없습니다. 오늘 진척을 추가하세요.</div>';
    return;
  }
  let h = '';
  modalLogsCache.forEach((log, i) => {
    h += '<div class="progress-row" style="display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-left:3px solid var(--accent);background:var(--accent-bg);border-radius:6px;margin-bottom:6px;">';
    h += '<span style="font-size:12px;font-weight:700;color:var(--accent);min-width:90px;flex-shrink:0;">' + esc(log.date) + '</span>';
    h += '<span style="flex:1;font-size:13px;line-height:1.5;color:var(--text);word-break:break-word;">' + esc(log.text) + '</span>';
    h += '<button type="button" onclick="removeProgressLog(' + i + ')" style="font-size:11px;padding:2px 8px;border:1px solid var(--border);background:var(--paper);color:var(--dim);border-radius:6px;cursor:pointer;flex-shrink:0;">삭제</button>';
    h += '</div>';
  });
  el.innerHTML = h;
}

function addProgressLogEntry() {
  const input = document.getElementById('progressLogInput');
  const dateEl = document.getElementById('progressLogDate');
  const txt = (input.value || '').trim();
  if (!txt) { input.focus(); return; }
  const d = dateEl.value || todayDateStr();
  modalLogsCache.unshift({ date: d, text: txt });
  // 최신 위로
  modalLogsCache.sort((a, b) => b.date.localeCompare(a.date));
  input.value = '';
  dateEl.value = todayDateStr();
  renderProgressList();
  input.focus();
}

function removeProgressLog(i) {
  modalLogsCache.splice(i, 1);
  renderProgressList();
}

async function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  const category = document.getElementById('fCategory').value;
  const owner = getCheckboxValues('fOwnerGroup');
  const startDate = document.getElementById('fStartDate').value;
  const endDate = document.getElementById('fEndDate').value;

  var missing = [];
  if (!title) missing.push('업무명');
  if (!category) missing.push('카테고리');
  if (!owner) missing.push('담당자');
  if (!startDate) missing.push('시작일');
  if (!endDate) missing.push('종료일');
  if (missing.length > 0) { alert('필수 항목을 입력하세요:\n' + missing.join(', ')); return; }

  const editId = document.getElementById('editId').value;

  // 입력박스에 미합류 진척 텍스트 있으면 자동 합류 (저장 누락 방지)
  const pendingProgress = (document.getElementById('progressLogInput').value || '').trim();
  if (pendingProgress) {
    const pd = document.getElementById('progressLogDate').value || todayDateStr();
    modalLogsCache.unshift({ date: pd, text: pendingProgress });
    modalLogsCache.sort((a, b) => b.date.localeCompare(a.date));
  }
  const composedContent = composeContent(document.getElementById('fContent').value, modalLogsCache);

  const params = {
    action: editId ? 'todo_update' : 'todo_add',
    title: title,
    category: document.getElementById('fCategory').value,
    owner: getCheckboxValues('fOwnerGroup'),
    startDate: document.getElementById('fStartDate').value,
    endDate: document.getElementById('fEndDate').value,
    content: composedContent,
    link: document.getElementById('fLink').value,
    approval: getCheckboxValues('fApprovalGroup'),
    creator: getUser()
  };
  if (editId) params.id = editId;

  // 첨부파일 처리 (여러 개 지원, 각 5MB 제한)
  const fileInput = document.getElementById('fFile');
  const filesToUpload = [];
  if (fileInput.files.length > 0) {
    for (const file of fileInput.files) {
      if (file.size > 5 * 1024 * 1024) { alert(file.name + ' — 5MB를 초과합니다. 건너뜁니다.'); continue; }
      const base64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
      filesToUpload.push({fileName: file.name, mimeType: file.type, base64: base64});
    }
  }

  closeModal();
  showToast('저장 중...');

  try {
    const res = await apiCall(params);
    if (res.ok) {
      // 파일이 있으면 순차 업로드
      if (filesToUpload.length > 0 && res.id) {
        showToast('파일 업로드 중... (0/' + filesToUpload.length + ')');
        let uploaded = 0;
        for (const f of filesToUpload) {
          const uploadRes = await apiCall({action:'todo_upload', id:res.id, fileName:f.fileName, mimeType:f.mimeType, base64:f.base64});
          if (uploadRes.ok) uploaded++;
          showToast('파일 업로드 중... (' + uploaded + '/' + filesToUpload.length + ')');
        }
        showToast((editId ? '수정' : '추가') + ' 완료 (파일 ' + uploaded + '건 첨부)');
      } else {
        showToast(editId ? '수정 완료' : '추가 완료');
      }
      await loadTasks();
    } else {
      throw new Error(res.error || '저장 실패');
    }
  } catch (e) {
    showToast('저장 실패: ' + e.message, true);
    // Fallback: add locally
    if (!editId) {
      const local = {
        id: 'LOCAL-' + Date.now(),
        title: params.title,
        category: params.category,
        owner: params.owner,
        startDate: params.startDate,
        endDate: params.endDate,
        content: params.content,
        status: '진행중',
        approval: params.approval,
        link: params.link,
        creator: params.creator,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      ALL_TASKS.push(local);
      saveFallback();
      renderTasks();
    }
  }
}

async function markDone(id) {
  if (!confirm('이 업무를 완료 처리하시겠습니까?')) return;
  showToast('완료 처리 중...');
  try {
    const res = await apiCall({ action: 'todo_done', id: id });
    if (res.ok) {
      showToast('완료 처리됨');
      await loadTasks();
    } else {
      throw new Error(res.error || '처리 실패');
    }
  } catch (e) {
    // Local fallback
    const t = ALL_TASKS.find(x => x.id === id);
    if (t) { t.status = '완료'; t.updatedAt = new Date().toISOString(); }
    saveFallback();
    renderTasks();
    showToast('완료 처리됨 (로컬)', true);
  }
}

function sendToTelegram(id) {
  const t = ALL_TASKS.find(x => x.id === id);
  if (!t) return;
  var lines = [];
  lines.push('📋 [웰페리온 결재요청]');
  lines.push('업무명: ' + (t.title || '-'));
  lines.push('카테고리: ' + (t.category || '-'));
  lines.push('담당자: ' + (t.owner || '-'));
  if (t.startDate || t.endDate) lines.push('기간: ' + formatDateRange(t.startDate, t.endDate));
  lines.push('결재요청: ' + (t.approval || '-'));
  const parsedTel = parseContent(t.content);
  if (parsedTel.body) lines.push('내용: ' + parsedTel.body);
  if (parsedTel.logs.length) {
    lines.push('📅 진척 (최근 ' + Math.min(3, parsedTel.logs.length) + '건):');
    parsedTel.logs.slice(0, 3).forEach(log => lines.push('  ' + log.date + ' | ' + log.text));
  }
  if (t.link) lines.push('링크: ' + t.link);
  var text = lines.join('\n');
  navigator.clipboard.writeText(text).then(function() {
    showToast('결재 메시지 복사 완료 — 텔레그램 결재방에 붙여넣기');
    var encoded = encodeURIComponent(text);
    setTimeout(function() { window.open('https://t.me/share/url?text=' + encoded, '_blank'); }, 500);
  });
}

    saveFallback();
    renderTasks();
    showToast('날짜 변경됨 (로컬)', true);
  }
}

/* ═══════════════════════════════════════════
   Share — 공유용 (간단 명료)
   ═══════════════════════════════════════════ */
function shareList() {
  const active = ALL_TASKS.filter(t => t.status !== '완료');
  let filtered = _applyShareFilters(active);

  const lines = [];
  filtered.forEach(t => {
    const cat = (t.category || '미분류').replace(/^\[\d+\]\s*/, '');
    let line = '[' + cat + '] ' + (t.title || '');
    if (t.owner) {
      line += ' @' + t.owner.split(',').map(s => s.trim()).join(' @');
    }
    if (t.startDate || t.endDate) {
      const s = t.startDate ? fmtDate(t.startDate).slice(5) : '';
      const e = t.endDate ? fmtDate(t.endDate).slice(5) : '';
      line += ' ' + s + '~' + e;
    }
    if (t.endDate) {
      const badge = getDeadlineBadge(t.endDate);
      if (badge && badge.cls !== 'due-ok') line += ' ' + badge.text;
    }
    lines.push(line);
  });

  _copyToClipboard(lines.join('\n'));
}

/* ═══════════════════════════════════════════
   Share — 보고용 공유 (격식체)
   ═══════════════════════════════════════════ */
function shareReport() {
  const active = ALL_TASKS.filter(t => t.status !== '완료');
  let filtered = _applyShareFilters(active);

  const now = new Date();
  const ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const user = getUser() || '김남욱GM';

  const lines = [
    '━━━ 웰페리온 업무 현황 보고 ━━━',
    '보고일: ' + ds,
    '보고자: ' + user,
    ''
  ];

  // Group by category
  const groups = {};
  const catOrder = CATEGORIES.concat(['']);
  filtered.forEach(t => {
    const cat = t.category || '미분류';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  catOrder.forEach(cat => {
    if (!groups[cat] || groups[cat].length === 0) return;
    const label = cat || '미분류';
    lines.push('■ ' + label + ' (' + groups[cat].length + '건)');
    groups[cat].forEach((t, idx) => {
      lines.push('  ' + (idx+1) + '. ' + (t.title || ''));
      let meta = '     ';
      if (t.owner) meta += '담당: ' + t.owner;
      if (t.startDate || t.endDate) {
        const s = t.startDate ? fmtDate(t.startDate).slice(5) : '';
        const e = t.endDate ? fmtDate(t.endDate).slice(5) : '';
        meta += ' | 기간: ' + s + '~' + e;
      }
      const status = t.status || '진행중';
      meta += ' | 상태: ' + status;
      if (t.endDate) {
        const badge = getDeadlineBadge(t.endDate);
        if (badge && badge.cls !== 'due-ok') meta += ' (' + badge.text + ')';
      }
      lines.push(meta);
    });
    lines.push('');
  });

  // Summary line
  const total = filtered.length;
  const approvalCount = filtered.filter(t => (t.approval || '').includes('대표님')).length;
  lines.push('━━━ 총 ' + total + '건' + (approvalCount > 0 ? ' (대표님 결재 대기 ' + approvalCount + '건)' : '') + ' ━━━');

  _copyToClipboard(lines.join('\n'));
}

/* ── Share helpers ── */
function _applyShareFilters(tasks) {
  let filtered = tasks;
  if (activeOwnerFilter === '대표님 결재건') {
    filtered = tasks.filter(t => (t.approval || '').includes('대표님'));
  } else if (activeOwnerFilter !== '전체') {
    filtered = tasks.filter(t => (t.owner || '').includes(activeOwnerFilter));
  }
  if (activeCatFilter !== '전체') {
    filtered = filtered.filter(t => t.category === activeCatFilter);
  }
  return filtered;
}

function _copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('클립보드에 복사되었습니다'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('클립보드에 복사되었습니다');
  }
}

/* ═══════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2500);
}

/* ═══════════════════════════════════════════
   Dashboard — 업무 현황 (인사평가용)
   ═══════════════════════════════════════════ */
function openDashboard() {
  renderDashboard();
  document.getElementById('dashboardOverlay').classList.add('show');
}

function closeDashboard() {
  document.getElementById('dashboardOverlay').classList.remove('show');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('dashboardOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDashboard();
  });
});

function renderDashboard() {
  const panel = document.getElementById('dashboardPanel');
  const all = ALL_TASKS;
  const active = all.filter(t => t.status !== '완료');
  const done = all.filter(t => t.status === '완료');
  const hold = all.filter(t => t.status === '보류');
  const total = all.length;
  const completionRate = total > 0 ? Math.round(done.length / total * 100) : 0;

  // Deadline compliance: completed tasks that finished within endDate
  let deadlineTotal = 0;
  let deadlineOk = 0;
  done.forEach(t => {
    if (t.endDate) {
      deadlineTotal++;
      const end = new Date(String(t.endDate).slice(0,10) + 'T23:59:59');
      const completed = t.updatedAt ? new Date(String(t.updatedAt).slice(0,10)) : new Date();
      if (completed <= end) deadlineOk++;
    }
  });
  const deadlineRate = deadlineTotal > 0 ? Math.round(deadlineOk / deadlineTotal * 100) : 0;

  const now = new Date();
  const ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

  let h = '';
  h += '<h2>업무 현황 대시보드 <span style="font-size:12px;color:var(--dim);font-weight:400;">' + ds + ' 기준</span>';
  h += '<span><button class="dash-print-btn" onclick="printDashboard()">인쇄</button>';
  h += '<button class="close-dash" onclick="closeDashboard()">&times;</button></span></h2>';

  // Summary stats
  h += '<div class="dash-stat-row">';
  h += '<div class="dash-stat-card"><div class="num">' + total + '</div><div class="label">총 건수</div></div>';
  h += '<div class="dash-stat-card"><div class="num" style="color:var(--blue)">' + active.filter(t=>t.status!=='보류').length + '</div><div class="label">진행중</div></div>';
  h += '<div class="dash-stat-card"><div class="num" style="color:var(--green)">' + done.length + '</div><div class="label">완료</div></div>';
  h += '<div class="dash-stat-card"><div class="num" style="color:var(--dim)">' + hold.length + '</div><div class="label">보류</div></div>';
  h += '<div class="dash-stat-card"><div class="num">' + completionRate + '%</div><div class="label">완료율</div></div>';
  h += '<div class="dash-stat-card"><div class="num" style="color:' + (deadlineRate >= 70 ? 'var(--green)' : 'var(--red)') + '">' + deadlineRate + '%</div><div class="label">마감 준수율</div></div>';
  h += '</div>';

  // Per-member stats
  h += '<h3>담당자별 통계</h3>';
  h += '<table class="dash-table"><tr><th>담당자</th><th>총</th><th>진행중</th><th>완료</th><th>보류</th><th>완료율</th><th style="min-width:100px">그래프</th></tr>';
  MEMBERS.forEach(m => {
    const mAll = all.filter(t => (t.owner||'').includes(m));
    const mDone = mAll.filter(t => t.status === '완료');
    const mActive = mAll.filter(t => t.status !== '완료' && t.status !== '보류');
    const mHold = mAll.filter(t => t.status === '보류');
    const mRate = mAll.length > 0 ? Math.round(mDone.length / mAll.length * 100) : 0;
    h += '<tr>';
    h += '<td><strong>' + esc(m) + '</strong></td>';
    h += '<td>' + mAll.length + '</td>';
    h += '<td>' + mActive.length + '</td>';
    h += '<td>' + mDone.length + '</td>';
    h += '<td>' + mHold.length + '</td>';
    h += '<td>' + mRate + '%</td>';
    h += '<td><div class="dash-bar-wrap"><div class="dash-bar green" style="width:' + mRate + '%"></div></div></td>';
    h += '</tr>';
  });
  h += '</table>';

  // Category distribution
  h += '<h3>카테고리별 분포</h3>';
  const catBarColors = ['blue','purple','accent','green','yellow','red'];
  h += '<table class="dash-table"><tr><th>카테고리</th><th>건수</th><th>비율</th><th style="min-width:120px">분포</th></tr>';
  CATEGORIES.forEach((cat, ci) => {
    const count = all.filter(t => t.category === cat).length;
    const pct = total > 0 ? Math.round(count / total * 100) : 0;
    const barColor = catBarColors[ci % catBarColors.length];
    h += '<tr>';
    h += '<td>' + esc(cat) + '</td>';
    h += '<td>' + count + '건</td>';
    h += '<td>' + pct + '%</td>';
    h += '<td><div class="dash-bar-wrap"><div class="dash-bar ' + barColor + '" style="width:' + pct + '%"></div></div></td>';
    h += '</tr>';
  });
  h += '</table>';

  // Completion trend (by month)
  h += '<h3>기간별 완료 추이</h3>';
  const monthMap = {};
  done.forEach(t => {
    const d = String(t.updatedAt || t.createdAt || '').slice(0, 7); // YYYY-MM
    if (d && d.length >= 7) {
      if (!monthMap[d]) monthMap[d] = 0;
      monthMap[d]++;
    }
  });
  const months = Object.keys(monthMap).sort();
  if (months.length === 0) {
    h += '<p style="color:var(--dim);font-size:13px;">완료 데이터가 없습니다.</p>';
  } else {
    const maxVal = Math.max(...Object.values(monthMap), 1);
    h += '<table class="dash-table"><tr><th>월</th><th>완료 건수</th><th style="min-width:120px">추이</th></tr>';
    months.forEach(m => {
      const pct = Math.round(monthMap[m] / maxVal * 100);
      h += '<tr><td>' + esc(m) + '</td><td>' + monthMap[m] + '건</td>';
      h += '<td><div class="dash-bar-wrap"><div class="dash-bar green" style="width:' + pct + '%"></div></div></td></tr>';
    });
    h += '</table>';
  }

  // Deadline details
  h += '<h3>마감 준수 상세</h3>';
  h += '<p style="font-size:13px;color:var(--dim);margin-bottom:8px;">종료일이 있는 완료 건 ' + deadlineTotal + '건 중 ' + deadlineOk + '건 기한 내 완료 (' + deadlineRate + '%)</p>';

  // Overdue active tasks
  const overdue = active.filter(t => {
    if (!t.endDate) return false;
    const end = new Date(String(t.endDate).slice(0,10) + 'T23:59:59');
    return end < now;
  });
  if (overdue.length > 0) {
    h += '<p style="font-size:13px;color:var(--red);font-weight:600;margin:8px 0 4px;">마감 초과 진행 건: ' + overdue.length + '건</p>';
    h += '<table class="dash-table"><tr><th>업무명</th><th>담당자</th><th>종료일</th><th>초과</th></tr>';
    overdue.forEach(t => {
      const end = new Date(String(t.endDate).slice(0,10) + 'T23:59:59');
      const diff = Math.ceil((now - end) / (1000*60*60*24));
      h += '<tr><td>' + esc(t.title) + '</td><td>' + esc(t.owner||'') + '</td><td>' + esc(fmtDate(t.endDate)) + '</td>';
      h += '<td style="color:var(--red);font-weight:600">+' + diff + '일</td></tr>';
    });
    h += '</table>';
  }

  panel.innerHTML = h;
}

function printDashboard() {
  document.body.dataset.printMode = 'dashboard';
  window.print();
  delete document.body.dataset.printMode;
}

function printTasks() {
  document.body.dataset.printMode = 'tasks';
  // 모든 카테고리 펼치기
  document.querySelectorAll('.cat-body').forEach(b => { if (!b.classList.contains('open')) { b.classList.add('open','print-opened'); b.previousElementSibling.querySelector('.cat-arrow')?.classList.add('open'); }});
  window.print();
  // 복원
  document.querySelectorAll('.cat-body.print-opened').forEach(b => { b.classList.remove('open','print-opened'); b.previousElementSibling.querySelector('.cat-arrow')?.classList.remove('open'); });
  delete document.body.dataset.printMode;
}
</script>
